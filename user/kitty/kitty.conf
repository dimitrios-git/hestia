# vim: ft=conf

# Fonts
font_family      Lilex Nerd Font Mono
font_size        11.0
# Color emoji fall back to Noto Color Emoji via fontconfig (needs the
# fonts-noto-color-emoji package; Nerd Fonts omit the Unicode emoji set). No
# symbol_map on purpose — kitty is presentation-aware, so text glyphs like ✓/✗
# stay in the primary font; a broad emoji symbol_map would wrongly pull them in.

# Scrollback
scrollback_lines          10000
scrollback_pager          less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0

# Window
window_padding_width 6
remember_window_size  yes
initial_window_width  120c
initial_window_height 36c

# Tab bar
tab_bar_style        powerline
tab_powerline_style  slanted
tab_title_template   {index}: {title}

# Bell
enable_audio_bell    no
visual_bell_duration 0.0

# Mouse
mouse_hide_wait 3.0
copy_on_select  no
open_url_with   default
url_style       curly

# Performance
repaint_delay   10
input_delay     3
sync_to_monitor yes

# Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+h show_scrollback

# Font size
map ctrl+shift+equal  change_font_size all +1.0
map ctrl+shift+minus  change_font_size all -1.0
map ctrl+shift+0      change_font_size all 0

# Window splits
map ctrl+shift+enter new_window
map ctrl+shift+w     close_window
map ctrl+shift+]     next_window
map ctrl+shift+[     previous_window

# Tabs
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab

# Colors — GENERATED variant fragment (theme-dark.conf / theme-light.conf,
# rendered by themes/hestia/render.py; the bootstrap symlinks the
# `theme_variant` one next to this file as theme.conf). Edit palette.yml +
# re-render, not the fragment. kitty resolves the include relative to the
# LITERAL config path (~/.config/kitty/, not the symlink target) — verified
# via kitty's own loader — so it finds the theme.conf symlink there.
include theme.conf
