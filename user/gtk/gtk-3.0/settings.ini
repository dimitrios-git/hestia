# GTK 3 settings. The estia-dark theme (recoloured adw-gtk3, installed by the gtk_theme
# role) carries the dark base + #ce0056 accent. This covers non-portal GTK3 apps; the
# portal file chooser reads the theme from gsettings instead (set at login by sway). See
# docs/theming.md.
[Settings]
gtk-theme-name=estia-dark
gtk-application-prefer-dark-theme=1
gtk-icon-theme-name=Adwaita
