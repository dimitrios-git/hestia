# GENERATED by themes/wildcharm/render.py from palette.yml v0.7.1 + scopes.yml — do not edit; edit the sources and re-render
# sway theme fragment — light (see config: include ~/.config/sway/theme.conf)

# Colors (roles from palette.yml)
set $bg        #f5f5f5
set $surface   #e4e4e4
set $border    #c6c6c6
set $text      #1a1a1a
set $dim       #626262
set $accent    #d7005f
set $accent_fg #ffffff

# Desktop background
output * bg #f5f5f5 solid_color

# Mouse cursor — sway's own cursor (window drags, resize, the bare desktop).
# Clients draw their own: GTK reads the gsettings exec below + settings.ini,
# XWayland/Qt read start-sway's XCURSOR_THEME export (all follow the variant).
seat * xcursor_theme breeze_cursors 24

# GTK / portal appearance for this variant (CLAUDE.md GTK section): color-scheme
# is what Firefox/portal-aware/libadwaita apps follow; gtk-theme is what the
# portal file chooser reads (in-process GTK3 apps follow start-sway's GTK_THEME).
# `exec` runs at login only — not re-run on `swaymsg reload`.
exec gsettings set org.gnome.desktop.interface color-scheme prefer-light
exec gsettings set org.gnome.desktop.interface gtk-theme hestia
exec gsettings set org.gnome.desktop.interface cursor-theme breeze_cursors
# Icon theme: the #d7005f-accent Yaru built by the opt-in yaru_icons role
# (Yaru-hestia). Guard on the theme actually existing so a spin without that
# role doesn't force a missing theme.
exec sh -c 'test -d "$HOME/.local/share/icons/Yaru-hestia" && gsettings set org.gnome.desktop.interface icon-theme Yaru-hestia'
