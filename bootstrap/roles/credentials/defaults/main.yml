---
# Login auto-unlock of SSH + GPG. See docs/credential-autounlock-design.md (§10
# as-built). This role only does the launcher-untangle that makes
# pam_gnome_keyring the SOLE starter of the login keyring; the hook scripts,
# gpg-agent.conf and the Sway exec line ride the `dotfiles` role, and
# gnome-keyring/libsecret-tools install via `packages`. The interactive,
# secret-handling steps (recreate the login keyring, secret-tool store the
# passphrases) stay manual — see bootstrap/README.md.

# gnome-keyring's XDG autostart components to mask (so they don't pre-start the
# daemon WITHOUT the login password, leaving the keyring locked).
credentials_keyring_autostart:
  - pkcs11
  - secrets
  - ssh
