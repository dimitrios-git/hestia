# themes/wildcharm/scopes.yml — the TextMate-family scope map (layer 2½).
#
# ONE ordered rule list maps syntax ROLES (palette.yml `syntax:` tables) to
# TextMate scopes, shared by every TM consumer: bat (.tmTheme), the web Shiki
# pair (stoa/thecodingidiot), and the VS Code themes. `themes/wildcharm/
# render.py` renders all of them from this file + palette.yml — edit a scope
# decision HERE (once, for every consumer), edit a colour in palette.yml.
#
# Rules carry: name (artifact label), scopes, and either a role (resolved to a
# colour per variant) or style-only entries (role: null). `paired: true` marks
# the one fg+bg rule (error). Notable decisions baked in (see the roadmap
# decision log + M2/M4 notes): storage.* follows vim's StorageClass→Type link
# except the function/class keywords; meta.function-call is deliberately
# excluded; wildcharm Statement is NOT bold.

rules:
  - name: Comment
    role: comment
    font_style: italic
    scopes: [comment, punctuation.definition.comment]

  - name: String
    role: string
    scopes: [string, string.quoted, punctuation.definition.string]

  - name: String escape / regex / interpolation
    role: string_special
    scopes:
      - constant.character.escape
      - string.regexp
      - punctuation.section.interpolation
      - punctuation.definition.template-expression

  - name: Constant
    role: constant
    scopes:
      - constant.numeric
      - constant.character
      - constant.other

  # phase-B detail (0.8.x): builtins + parameters get the SAME colour as their
  # coarse role, distinguished by ITALIC (no new hue) — mirrors the nvim
  # treesitter @*.builtin / @variable.parameter treatment (hestia.vim's
  # hestiaBuiltin*/hestiaParam groups) so nvim, bat and Shiki agree by role.
  - name: Builtin constant (italic) — True/None/null, library constants
    role: constant
    font_style: italic
    scopes: [constant.language, support.constant]

  - name: Language variable (self/this)
    role: constant
    font_style: italic
    # `variable.language` catches self/this in USE + this in most grammars.
    # In a PARAM list, MagicPython scopes self/cls as
    # variable.parameter.function.language.special.* — more specific than the
    # Parameter rule's `variable.parameter`, so listing it here wins and self
    # stays pink there too (params without .language.special stay plain). Other
    # grammars' this/self add their scopes here as the testbench surfaces them.
    scopes:
      - variable.language
      - variable.parameter.function.language.special.self
      - variable.parameter.function.language.special.cls

  - name: Keyword (vim Statement, not bold)
    role: keyword
    scopes: [keyword, keyword.control, keyword.operator, keyword.other]

  - name: Storage (vim StorageClass -> Type)
    role: type
    scopes: [storage, storage.type, storage.modifier]

  - name: Function/class keywords stay keywords
    role: keyword
    scopes: [storage.type.function, storage.type.class]

  - name: Function
    role: identifier
    scopes: [entity.name.function, variable.function]

  - name: Builtin function (italic) — library/global functions
    role: identifier
    font_style: italic
    scopes: [support.function]

  - name: Type / class
    role: type
    scopes:
      - entity.name.type
      - entity.name.class
      - entity.name.namespace

  - name: Builtin type (italic) — library/primitive types
    role: type
    font_style: italic
    scopes: [support.type, support.class]

  - name: Preprocessor / import
    role: preproc
    scopes:
      - meta.preprocessor
      - keyword.control.import
      - keyword.control.export
      - keyword.control.directive
      - keyword.control.at-rule

  # Decorators / attributes / annotations -> preproc (cyan), matching nvim's
  # @attribute. More-specific scope than entity.name.function, so it wins over
  # the Function rule for @decorator-style tokens.
  - name: Decorator / attribute / annotation
    role: preproc
    scopes:
      - entity.name.function.decorator
      - meta.decorator
      - punctuation.definition.decorator
      - meta.annotation
      - storage.type.annotation
      # NB: NOT `meta.attribute` — MagicPython scopes member access
      # (self.count -> meta.member.access.meta.attribute) under it, which would
      # wrongly colour every `obj.member`. Rust attributes need their own scope.

  - name: Parameter (italic)
    role: text
    font_style: italic
    scopes: [variable.parameter]

  - name: Plain (variables, punctuation)
    role: text
    scopes:
      - variable
      - variable.other
      - punctuation
      - meta.brace
      - punctuation.separator
      - punctuation.terminator

  - name: Tag
    role: keyword
    scopes: [entity.name.tag, punctuation.definition.tag]

  - name: Tag attribute
    role: type
    scopes: [entity.other.attribute-name]

  - name: Heading (vim Title)
    role: text
    font_style: bold
    scopes: [markup.heading, markup.heading entity.name]

  - name: Bold
    role: text
    font_style: bold
    scopes: [markup.bold]

  - name: Italic
    role: null
    font_style: italic
    scopes: [markup.italic]

  - name: Link
    role: link
    font_style: underline
    scopes: [markup.underline.link, markup.link, string.other.link]

  - name: Raw / code span
    role: preproc
    scopes: [markup.raw, markup.inline.raw]

  - name: Diff inserted
    role: diff_add
    scopes: [markup.inserted, meta.diff.header.to-file]

  - name: Diff deleted
    role: diff_delete
    scopes: [markup.deleted, meta.diff.header.from-file]

  - name: Diff changed
    role: diff_change
    scopes: [markup.changed]

  - name: Invalid
    role: error
    paired: true
    scopes: [invalid, invalid.illegal]
