---
# The hestia GTK3 theme = adw-gtk3 (a pinned GitHub release) with the accent recoloured to
# the hestia palette accent. Covers GTK3 apps (Remmina, GIMP, Firefox's file chooser);
# GTK4/libadwaita apps can't be themed on Debian trixie's libadwaita 1.7 (see
# docs/theming.md). No build toolchain needed — adw-gtk3 references @accent_bg_color at
# RUNTIME (156×), so recolouring is a single @define-color edit baked into the shipped CSS.
gtk_theme_adw_version: "6.5"
gtk_theme_adw_url: "https://github.com/lassekongo83/adw-gtk3/releases/download/v{{ gtk_theme_adw_version }}/adw-gtk3v{{ gtk_theme_adw_version }}.tar.xz"
gtk_theme_adw_sha256: "a81780fadfc432be0fc3d89c4ebb41aa28e4f032d42c36f9789c57dd10cfa41c"
# Accent baked into the theme — the hestia palette accent (themes/hestia/palette.yml →
# roles.accent). Changing it changes the idempotency marker, triggering a rebuild.
gtk_theme_accent: "#7c3aed"
