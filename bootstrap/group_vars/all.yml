---
# Bootstrap manifest — the single source of truth the roles consume.
# See docs/repo-structure-design.md (Ansible engine, YAML manifest).

# Repo root, derived from where the playbook lives (bootstrap/ is one level down).
# Generalises the hardcoded /home/dimitrios/Development/hestia — this is the
# path-generalisation the spin needs.
repo_root: "{{ (playbook_dir + '/..') | realpath }}"
target_home: "{{ lookup('env', 'HOME') }}"

# --- Feature toggles (the configurable-installer surface, §6) ------------------
# Each gates an OPTIONAL role in site.yml via `when:`. `packages` + `dotfiles` are
# core and always run. Defaults are `true` = the full setup (dimitrios's host);
# set one false to skip its role — per host in host_vars, or ad-hoc with
# `-e enable_samba=false`. The eventual installer (docs/repo-structure-design.md
# §6) just writes these from the user's answers.
enable_samba: true          # Samba file share (samba role → /etc, /srv/smbshare)
enable_tailscale: true      # Tailscale mesh VPN from its own apt repo (tailscale role); also the
                            # samba share's transport — when BOTH are on, smb.conf allows the
                            # Tailscale CGNAT range, otherwise the share is LAN-only
enable_claude_user: true    # dedicated `claude` agent user + shared tree + ACLs (claude_user role)
enable_credentials: true    # login auto-unlock of SSH + GPG (credentials role)
# Default OFF — host-specific (needs an NVIDIA card), pulls non-free, builds a kernel
# module, and requires a reboot. setup.sh detects a card and asks. (nvidia role.)
enable_nvidia: false        # proprietary NVIDIA driver (Debian non-free)
# Default OFF — host-specific (needs Razer USB gear; setup.sh detects and asks).
# OpenRazer from Debian apt + Polychromatic from the vendor's own Debian repo
# (not in Debian; their old Launchpad PPA is SHA-1-signed and trixie rejects it).
# Builds a DKMS module; the reboot/replug + plugdev re-login stay manual.
enable_razer: false         # Razer peripherals: openrazer + polychromatic (razer role)
# Package-only toggle (no role): gates the `office` apt group below via
# package_group_features. Default OFF — libreoffice is heavy (~hundreds of MB) and
# only vifm's office-doc opener needs it; turn on per host if you want it.
enable_libreoffice: false   # install libreoffice + its GTK3 plugin (vifm opens office docs with it)
# Package-only toggle (no role): gates the `video` apt group below via
# package_group_features. Default OFF — kdenlive is heavy (pulls a large slice of
# KDE Frameworks 6 + Qt6 multimedia libs) and host-specific; turn on per host. It's
# also the reference Qt6/KF6 app for the Qt theming track (docs/theming.md row 69).
enable_kdenlive: false      # install kdenlive (Qt6/KF6 video editor; Qt-theming test target)
# Package-only toggle (no role): gates the `email` apt group below via
# package_group_features. Default OFF — an email client is a per-host choice. The
# hestia theming (user/thunderbird/, deployed by the dotfiles role into whatever
# profiles exist) is INDEPENDENT of this toggle — it follows Thunderbird's presence.
enable_thunderbird: false   # install thunderbird (email client; hestia-themed via userChrome)
# Package-ish toggle (no role): gates the `file_managers` apt group below AND the
# yazi/ya localbin entries (their `enabled:` key). Default OFF — an EVALUATION set
# alongside the primary vifm (which STAYS the terminal primary — the trial verdict
# on speed was no contest): ranger + yazi (terminal), krusader + dolphin (KDE;
# ride the Hestia kdeglobals scheme like kdenlive), thunar + nemo + nautilus (GTK
# GUI; thunar/nemo are GTK3 — hestia/hestia-dark + Yaru-hestia apply automatically;
# nautilus is GTK4/libadwaita — dark-only until Debian 14, and the live test target
# for the staged gtk-4.0/gtk.css accent). nemo is the intended default GUI manager
# once the trial concludes. Trim the group to the keepers then.
enable_file_managers: false # install the file-manager evaluation set (ranger/yazi/krusader/dolphin/thunar/nemo/nautilus)
# Package-only toggle (no role): gates the `image_viewers` apt group below.
# Default OFF — the KEEPER of the 2026-07 evaluation, alongside the primary imv
# (Wayland-native, the vifm/sway integration): ristretto (GTK3; hestia layout +
# h/l accels via user/ristretto/, accent thumbnail selection via the gtk-3.0
# gtk.css style properties). Dropped after live trial: nsxiv (single-image X11
# viewer, no grid/menus), viu (half-blocks, not the ASCII look hoped for — the
# vifm in-pane preview experiment reverted), and qimgv (its own theme engine
# covered the main surfaces but menus/icons stayed unthemed — not worth the
# road; it also saves its theme on exit, see the 6f5051a clobber story).
enable_image_viewers: false # install the image-viewer keeper (ristretto)
# Package-ish toggle (no role): gates the wpaperd/awww localbin entries (their
# `enabled:` key) AND the `wallpapers` role (the mesh assets). Default ON since
# the 2026-07 VERDICT: the default hestia background is the mesh
# (themes/plain-mesh/, stoa's tci ambient lattice) painted per-output by wpaperd
# via user/sway/wallpaper.sh (exec_always in the generated theme fragment — it
# also retires the solid-ground swaybg, which reload respawns above the
# wallpaper layer). Engine re-picked 2026-07: the original mpvpaper VIDEO loop
# leaked memory without bound (unfixed upstream mpv bug #15099 — a 4K loop hit
# ~14 GB RSS in 3 days), so wpaperd (the verdict runner-up) now paints the
# STATIC t=0 mesh PNGs; mpvpaper was DROPPED entirely (binary + libmpv2 gone).
# Set false for a lean spin: the fragment's solid ground is the no-op fallback.
# Neither tool is in Debian apt and neither ships prebuilt binaries, so the
# claude agent builds them once and publishes the sha256-verified set as a
# hestia release (the Yaru pattern; amd64-only until a rebuild). The tool set:
# wpaperd (+wpaperctl — the default stills engine: per-output config,
# hw-accelerated transitions, `wpaperctl` IPC), awww (+awww-daemon — the
# maintained successor of the archived swww; runtime `awww img` switching with
# animated transitions, no native slideshow — user/bin/awww-slideshow fills
# that). swaybg stacking is timing-dependent (live: swaybg hid wpaperd; a
# `swaymsg reload` respawns it above the wallpaper layer), so wallpaper.sh
# `pkill -x swaybg`s after painting and re-runs on every reload.
enable_wallpapers: true     # wallpaper stack: wpaperd+awww binaries AND the mesh default background (static PNGs via wpaperd)
# Default OFF — installs the prebuilt #d7005f Yaru ICON theme (a ~27 MB sha256-verified
# download into ~/.local, no root, no build toolchain). The theme is built on demand by
# the claude agent and published as a hestia release; turn on per host to theme icons.
enable_yaru_icons: false    # install the prebuilt Yaru-hestia icon theme (yaru_icons role)
# Headless browser for front-end dev/testing (screenshots, cookie/network traces,
# Playwright/Puppeteer targets). Debian's `chromium` package pulls the runtime libs
# a headless engine needs (libnss3/libgbm1/libasound2/…), so a driver can drive it or
# the agent can `chromium --headless --screenshot` directly. Heavy (~a few hundred MB)
# but broadly useful, so it's part of the full host — a lean spin sets this false.
enable_headless_browser: true   # install chromium for headless dev/testing (package-only)
# The assumed desktop browser (package-only toggle): the sway config's
# inhibit_idle media rules, the GTK3 hestia-dark chrome theming, and the portal
# color-scheme work all presuppose Firefox — but it was never in the manifest
# (this machine got firefox-esr from Debian's desktop task; a lean spin would
# come up browserless). ESR because that is what Debian ships.
enable_firefox: true        # install firefox-esr (the desktop browser)
# PWAsForFirefox: the firefoxpwa role adds the vendor apt repo + native
# connector — the FFPWA-* windows (Netflix/YouTube/…) the sway config already
# handles. The in-Firefox extension + per-site installs stay manual.
enable_firefoxpwa: true     # install firefoxpwa from its vendor repo (firefoxpwa role)
# Google Chrome (the `chrome` role): google-chrome-stable from Google's own
# signed apt repo — NOT in Debian apt (that ships `chromium`; Chrome is the
# Google proprietary build). amd64-only; the role self-skips on other arches.
# Default OFF — an extra desktop browser on top of Firefox/chromium; turn on
# per host if you want it.
enable_chrome: false        # install Google Chrome from Google's vendor repo (chrome role)
# Trading apps (the `trading` role): TradingView Desktop from the vendor's
# rolling "latest" .deb (no apt repo and no versioned URLs exist — nothing to
# pin; TLS-trust, installed only when absent). JForex4 joins the role when it
# lands. Default OFF — proprietary + niche; turn on per host.
enable_trading: false       # install trading apps (TradingView Desktop; JForex4 later)
# MEGA Desktop (the `mega` role): MEGAsync from MEGA's own signed apt repo — NOT
# in Debian apt (proprietary cloud-sync client). amd64/arm64; the role self-skips
# other arches. Installs the package only; signing in + choosing synced folders
# (e.g. → /mnt/cloud-data/files/MEGA) is in-app on first run and stays manual.
# Default OFF — a per-host choice. Add `nemo-megasync` etc. via `mega_packages`.
enable_mega: false          # install MEGA Desktop from MEGA's vendor repo (mega role)
# Theming testbench (the `testbench` role, no root): generates a disposable demo
# folder of per-language code samples + dircolors/ls file-type fixtures so theme
# changes can be eyeballed across editors + file managers from one place. Default
# OFF — a maintainer/theming aid, not part of a normal install.
enable_testbench: false     # generate the theming testbench folder (testbench role)

# --- Theme variant (M7, docs/theme-roadmap.md) ----------------------------------
# dark|light — selects which GENERATED theme fragments the dotfiles role links
# (kitty/sway/waybar theme.*, the vim background selector) and what the rendered
# configs carry (the gsettings gtk-theme + gtk-3.0 settings.ini theme name).
# Flip it in host_vars, re-run the playbook (`./setup.sh --yes`, or
# `--tags dotfiles,sway_session`), then RE-LOGIN — the sway
# gsettings execs only apply to a new session.
theme_variant: dark

# --- Identity (rendered into git config + the credential-unlock hook) ----------
# Personal — these defaults are de-personalised placeholders, OVERRIDDEN per host
# in host_vars/<host>.yml (setup.sh detects + prompts). Empty signing key → git
# `gpgsign = false` and the GPG warm step in credential-unlock.sh no-ops.
git_user_name: "Your Name"
git_user_email: "you@example.com"
git_signingkey: ""          # GPG signing key id (also SIGNKEY in credential-unlock)
gpg_keygrip: ""             # keygrip of git_signingkey (`gpg --with-keygrip …`)
ssh_key_file: "id_ed25519"  # private key in ~/.ssh that the login hook loads

# --- Dotfile symlinks (repo path relative to repo_root -> absolute dest) -------
# Mirrors CLAUDE.md's "Active symlinks" table; CLAUDE.md should be regenerated
# from this list, not hand-maintained (kills doc-vs-reality drift).
dotfile_links:
  - { src: user/vim/.vimrc,                 dest: "{{ target_home }}/.vimrc", claude: true }
  # hestia editor colorscheme (palette-driven, near-black bg). In ~/.vim/colors so both
  # Vim and Neovim find it (nvim prepends ~/.vim to its runtimepath).
  - { src: user/vim/colors/hestia.vim,      dest: "{{ target_home }}/.vim/colors/hestia.vim", claude: true }
  # theme-variant selector sourced by .vimrc before `colo hestia` (M7): the src is
  # picked by `theme_variant`, the dest name is variant-neutral.
  - { src: "user/vim/hestia-background-{{ theme_variant }}.vim", dest: "{{ target_home }}/.vim/hestia-background.vim", claude: true }
  - { src: user/bash/.bashrc,               dest: "{{ target_home }}/.bashrc", claude: true }
  # GENERATED pair (render.py — same file-type table as vifm's colorscheme, so
  # `ls` and vifm agree by construction). src picked by `theme_variant` (M7).
  - { src: "user/bash/.dircolors-{{ theme_variant }}", dest: "{{ target_home }}/.dircolors", claude: true }
  - { src: user/git/.gitignore_global,      dest: "{{ target_home }}/.gitignore_global", claude: true }
  - { src: user/gnupg/gpg-agent.conf,       dest: "{{ target_home }}/.gnupg/gpg-agent.conf" }
  - { src: user/nvim/init.vim,              dest: "{{ target_home }}/.config/nvim/init.vim", claude: true }
  - { src: user/nvim/lua/trees.lua,         dest: "{{ target_home }}/.config/nvim/lua/trees.lua", claude: true }
  - { src: user/sway/config,                dest: "{{ target_home }}/.config/sway/config" }
  # GENERATED theme fragment (render.py) — colour $vars, desktop bg, the gsettings
  # appearance execs; `include`d by the sway config. src picked by `theme_variant` (M7).
  - { src: "user/sway/theme-{{ theme_variant }}.conf", dest: "{{ target_home }}/.config/sway/theme.conf" }
  # sway-launched session scripts — referenced via $HOME in user/sway/config `exec`
  # (sway runs exec through `sh -c`), so they need a stable ~ path.
  # (credential-unlock.sh + keyring-ssh-askpass.sh carry identity values, so
  # they're rendered — see templated_configs below — into the same dir.)
  - { src: user/sway/start-waybar.sh,       dest: "{{ target_home }}/.config/sway/scripts/start-waybar.sh" }
  - { src: user/sway/screenshot.sh,         dest: "{{ target_home }}/.config/sway/scripts/screenshot.sh" }
  - { src: user/sway/wallpaper.sh,          dest: "{{ target_home }}/.config/sway/scripts/wallpaper.sh" }
  - { src: user/sway/nemo-setup.sh,         dest: "{{ target_home }}/.config/sway/scripts/nemo-setup.sh" }
  - { src: user/waybar/config,              dest: "{{ target_home }}/.config/waybar/config" }
  - { src: user/waybar/style.css,           dest: "{{ target_home }}/.config/waybar/style.css" }
  # GENERATED colour tokens (render.py) — @import'ed by style.css. src picked by
  # `theme_variant` (M7).
  - { src: "user/waybar/theme-{{ theme_variant }}.css", dest: "{{ target_home }}/.config/waybar/theme.css" }
  - { src: user/waybar/scripts/cpu.sh,      dest: "{{ target_home }}/.config/waybar/scripts/cpu.sh" }
  - { src: user/waybar/scripts/audio.sh,    dest: "{{ target_home }}/.config/waybar/scripts/audio.sh" }
  - { src: user/waybar/scripts/gpu.sh,      dest: "{{ target_home }}/.config/waybar/scripts/gpu.sh" }
  - { src: user/waybar/scripts/gpu-watch.sh, dest: "{{ target_home }}/.config/waybar/scripts/gpu-watch.sh" }
  - { src: user/waybar/scripts/weather.sh,   dest: "{{ target_home }}/.config/waybar/scripts/weather.sh" }
  - { src: user/waybar/scripts/notifications.sh, dest: "{{ target_home }}/.config/waybar/scripts/notifications.sh" }
  - { src: user/waybar/scripts/usb.sh,        dest: "{{ target_home }}/.config/waybar/scripts/usb.sh" }
  - { src: user/waybar/scripts/power.sh,      dest: "{{ target_home }}/.config/waybar/scripts/power.sh" }
  - { src: user/mako/config,                dest: "{{ target_home }}/.config/mako/config" }
  # GENERATED colours + urgent section (render.py) — include'd (last) by the mako
  # config. src picked by `theme_variant` (M7).
  - { src: "user/mako/theme-{{ theme_variant }}.conf", dest: "{{ target_home }}/.config/mako/theme.conf" }
  - { src: user/wofi/config,                dest: "{{ target_home }}/.config/wofi/config" }
  - { src: user/wofi/style.css,             dest: "{{ target_home }}/.config/wofi/style.css" }
  # GENERATED wofi COLORS FILE (render.py) — wofi's own macro mechanism
  # (--wofi-color<n> in style.css; `colors=colors` in the wofi config). NOT a CSS
  # fragment: wofi preprocesses the stylesheet text, so @import doesn't work there.
  # src picked by `theme_variant` (M7).
  - { src: "user/wofi/colors-{{ theme_variant }}", dest: "{{ target_home }}/.config/wofi/colors" }
  # GENERATED whole-file variant pair (render.py; swaylock has no include) — src
  # picked by `theme_variant` (M7).
  - { src: "user/swaylock/config-{{ theme_variant }}", dest: "{{ target_home }}/.config/swaylock/config" }
  # GENERATED whole-file variant pair (render.py; swaynag has no include) — src
  # picked by `theme_variant` (M7).
  - { src: "user/swaynag/config-{{ theme_variant }}", dest: "{{ target_home }}/.config/swaynag/config" }
  - { src: user/cava/config,                dest: "{{ target_home }}/.config/cava/config", claude: true }
  - { src: user/kitty/kitty.conf,           dest: "{{ target_home }}/.config/kitty/kitty.conf", claude: true }
  # GENERATED terminal colours (render.py) — `include`d by kitty.conf. src picked by
  # `theme_variant` (M7).
  - { src: "user/kitty/theme-{{ theme_variant }}.conf", dest: "{{ target_home }}/.config/kitty/theme.conf", claude: true }
  - { src: user/kitty/music.session,        dest: "{{ target_home }}/.config/kitty/music.session", claude: true }
  - { src: user/imv/config,                 dest: "{{ target_home }}/.config/imv/config" }
  # imv↔vifm integration (vifm `i` opens imv tiled, live cursor sync, q returns):
  # the dedicated imv config + its on-quit/sync return script. Exec bit from src.
  - { src: user/imv/config-vifm,            dest: "{{ target_home }}/.config/imv/config-vifm" }
  - { src: user/imv/imv-vifm-return.sh,     dest: "{{ target_home }}/.config/imv/imv-vifm-return.sh" }
  - { src: user/zathura/zathurarc,          dest: "{{ target_home }}/.config/zathura/zathurarc" }
  # GENERATED colours + recolor block (render.py) — `include theme` in zathurarc.
  # src picked by `theme_variant` (M7).
  - { src: "user/zathura/theme-{{ theme_variant }}", dest: "{{ target_home }}/.config/zathura/theme" }
  - { src: user/vifm/vifmrc,                dest: "{{ target_home }}/.config/vifm/vifmrc", claude: true }
  # GENERATED colorscheme pair (render.py) — dest keeps the `hestia` name so
  # vifmrc's `colorscheme hestia` needs no variant logic; src picked by
  # `theme_variant` (M7).
  - { src: "user/vifm/colors/hestia-{{ theme_variant }}.vifm", dest: "{{ target_home }}/.config/vifm/colors/hestia.vifm", claude: true }
  # vifm quick-view dispatcher (catch-all fileviewer) — syntax-highlighted code
  # preview via bat; executable bit comes from the source file.
  - { src: user/vifm/scripts/preview.sh,    dest: "{{ target_home }}/.config/vifm/scripts/preview.sh", claude: true }
  # vifm `i` image-browse launcher (opens imv tiled, jumps the open imv on re-press)
  - { src: user/vifm/scripts/imv-browse.sh, dest: "{{ target_home }}/.config/vifm/scripts/imv-browse.sh" }
  # vifm :gc/:gs helper — lists branch-vs-main changed files (+ ancestor dirs)
  - { src: user/vifm/scripts/git-changed.sh, dest: "{{ target_home }}/.config/vifm/scripts/git-changed.sh", claude: true }
  # bat — config + the hestia syntax theme. The theme is compiled into bat's
  # cache by the dotfiles role (`bat cache --build`) after this link is made.
  - { src: user/bat/config,                 dest: "{{ target_home }}/.config/bat/config", claude: true }
  # GENERATED tmTheme pair (render.py) — dest keeps the `hestia` name (bat
  # selects themes by file stem; config --theme untouched); src picked by
  # `theme_variant` (M7). Cache rebuilt by this role's `bat cache --build`.
  - { src: "user/bat/themes/hestia-{{ theme_variant }}.tmTheme", dest: "{{ target_home }}/.config/bat/themes/hestia.tmTheme", claude: true }
  # GENERATED glamour style pair (render.py) — dest keeps the name glow.yml points
  # at; src picked by `theme_variant` (M7).
  - { src: "user/glow/hestia-{{ theme_variant }}.json", dest: "{{ target_home }}/.config/glow/hestia.json", claude: true }
  # file-manager evaluation themes (enable_file_managers gates the APPS; the
  # config symlinks below are unconditional — harmless without the app, and a
  # manual install picks them straight up, same ruling as every other config)
  - { src: "user/yazi/theme-{{ theme_variant }}.toml", dest: "{{ target_home }}/.config/yazi/theme.toml", claude: true }
  - { src: user/ranger/rc.conf,             dest: "{{ target_home }}/.config/ranger/rc.conf", claude: true }
  - { src: "user/ranger/colorschemes/hestia-{{ theme_variant }}.py", dest: "{{ target_home }}/.config/ranger/colorschemes/hestia.py", claude: true }
  # wallpaper stack (enable_wallpapers gates the BINARIES via localbin; these
  # config/helper symlinks are unconditional — same ruling as yazi/ranger).
  # The default engine is wpaperd on static mesh PNGs (user/sway/wallpaper.sh);
  # mpvpaper was dropped 2026-07 (its video loop leaked memory), so its
  # slideshow wrapper went with it — awww-slideshow stays for awww.
  - { src: user/wpaperd/config.toml,        dest: "{{ target_home }}/.config/wpaperd/config.toml" }
  - { src: user/bin/awww-slideshow,         dest: "{{ target_home }}/.local/bin/awww-slideshow" }
  - { src: user/xdg-desktop-portal/sway-portals.conf, dest: "{{ target_home }}/.config/xdg-desktop-portal/sway-portals.conf" }
  # (gtk-3.0 settings.ini moved to templated_configs — M7: its theme name follows
  # `theme_variant`; the css overlays stay variant-invariant symlinks.)
  - { src: user/gtk/gtk-3.0/gtk.css,        dest: "{{ target_home }}/.config/gtk-3.0/gtk.css" }
  - { src: user/gtk/gtk-4.0/settings.ini,   dest: "{{ target_home }}/.config/gtk-4.0/settings.ini" }
  - { src: user/gtk/gtk-4.0/gtk.css,        dest: "{{ target_home }}/.config/gtk-4.0/gtk.css" }
  - { src: user/bin/claude-access,          dest: "{{ target_home }}/.local/bin/claude-access" }
  # headless-sway screenshot rig (docs/claude-env-parity-design.md Tier B) — lets the
  # claude agent re-shoot themed showcase images with no live desktop. claude-tagged
  # (its purpose is claude's, though harmless for dimitrios). No secrets/identity.
  - { src: user/bin/hestia-shot,            dest: "{{ target_home }}/.local/bin/hestia-shot", claude: true }
  # Claude Code keybindings (docs/claude-user-design.md §10 — persist the agent's
  # Claude Code config as workstation-as-code). Pure UI config, no secrets: unbinds
  # `escape` in the Chat context so a vi-mode reflex (ESC to leave insert mode in the
  # shell) can't interrupt a running agent — ^C stays the interrupt. Deployed to
  # whichever home runs the bootstrap; it only has an effect where Claude Code runs
  # (the `claude` user). settings.json is app-writable, so it is RENDERED (a real
  # file, not this symlink) — see templated_configs below.
  - { src: user/claude/keybindings.json,    dest: "{{ target_home }}/.claude/keybindings.json", claude: true }

# --- Rendered (templated) user configs ----------------------------------------
# Path-generalisation (docs/repo-structure-design.md §5): configs that hardcode an
# absolute path a format can't expand (no ~/$VARS) are rendered from a .j2 instead
# of symlinked — so they carry no /home/<user> literal. The src is a Jinja2
# template; vars come from this manifest (e.g. target_home). Keep this set SMALL —
# rendering loses direct-edit; symlink everything that doesn't truly need it.
# Optional `mode:` per item (default 0644) — scripts that get executed need 0755.
# Optional `force:` per item (default true) — set false to SEED ONCE: render only
# when the dest is absent, never overwrite a user's own file on re-run.
templated_configs:
  - { src: user/git/.gitconfig.j2,          dest: "{{ target_home }}/.gitconfig" }
  - { src: user/glow/glow.yml.j2,           dest: "{{ target_home }}/.config/glow/glow.yml", claude: true }
  - { src: user/cmus/rc.j2,                 dest: "{{ target_home }}/.config/cmus/rc", claude: true }
  # gtk-3.0 settings: the theme name + prefer-dark flag follow `theme_variant` (M7)
  - { src: user/gtk/gtk-3.0/settings.ini.j2, dest: "{{ target_home }}/.config/gtk-3.0/settings.ini" }
  # credential scripts: carry identity values (ssh_key_file/keygrip/signingkey) and
  # are executed (sway exec + SSH_ASKPASS), so rendered + 0755, both into the same
  # dir so credential-unlock.sh finds its sibling via `readlink -f`.
  - { src: user/gnupg/credential-unlock.sh.j2,   dest: "{{ target_home }}/.config/sway/scripts/credential-unlock.sh",   mode: "0755" }
  - { src: user/gnupg/keyring-ssh-askpass.sh.j2, dest: "{{ target_home }}/.config/sway/scripts/keyring-ssh-askpass.sh", mode: "0755" }
  # Claude Code settings — the agent's permission policy (allow/deny) + UI prefs
  # (docs/claude-user-design.md §10). No secrets/tokens (auth lives in claude's 0700
  # home, never committed). RENDERED (not symlinked) because Claude Code writes back
  # to this file (theme/permission changes) — a symlink would dirty the repo clone.
  # `force: false` = SEED ONCE: lay our reviewed baseline down on a clean install, but
  # NEVER overwrite an existing settings.json — this is a file users personalise, and
  # the bootstrap re-runs must leave their edits alone. To change the shipped baseline,
  # edit the .j2; existing installs keep whatever they have. The kernel boundary
  # (claude unprivileged, not in sudo) plus this deny-list (no sudo, no push to main,
  # no `gh pr merge`, no `.env` reads) are the two halves of the trust model.
  - { src: user/claude/settings.json.j2,    dest: "{{ target_home }}/.claude/settings.json", force: false, claude: true }
  # ristretto: COPIES, not symlinks — xfconfd rewrites the channel xml atomically
  # (rename) on any property change (window geometry on every exit) and ristretto
  # re-saves accels.scm on quit, either of which would destroy a symlink. hestia
  # OWNS both (a re-run resets in-app tweaks — kdeglobals ruling); the xml lands
  # at the NEXT login (a live xfconfd holds the channel in memory).
  - { src: user/ristretto/ristretto.xml.j2, dest: "{{ target_home }}/.config/xfce4/xfconf/xfce-perchannel-xml/ristretto.xml" }
  - { src: user/ristretto/accels.scm,       dest: "{{ target_home }}/.config/ristretto/accels.scm" }

# --- claude environment parity (docs/claude-env-parity-design.md) --------------
# Deploy the SAME terminal + theme configs to the `claude` agent user's own home,
# from claude's own clone, so the two principals see the same environment. Reuses
# the `dotfiles` role (site.yml runs it a second time as claude with these slices).
# Only the subset tagged `claude: true` above is deployed — NEVER identity/secrets
# (gitconfig / credential scripts / keys stay claude's own, set by the claude_user
# role) or the desktop layer (that rides the Tier-B screenshot rig, a later PR).
enable_claude_env: true
# Tier B — the screenshot rig's desktop tools/assets for claude (wpaperd/awww via
# localbin + the mesh wallpaper assets), so `hestia-shot` composites use claude's
# real deployed wallpaper. Rides enable_claude_user; set false for a lean agent.
enable_claude_rig: true
claude_env_user: claude                      # the agent user (claude_user role owns its identity)
claude_env_home: /home/claude                # claude's home (docs/claude-user-design.md)
claude_env_repo_root: /srv/devshare/hestia   # claude's OWN clone — its env tracks its workspace branch
claude_env_theme_variant: dark               # claude runs the dark variant
# The claude subset, derived from the one manifest — `selectattr('claude','defined')`
# is null-safe on entries without the key, so there's no second list to drift.
claude_dotfile_links: "{{ dotfile_links | selectattr('claude', 'defined') | list }}"
claude_templated_configs: "{{ templated_configs | selectattr('claude', 'defined') | list }}"

# --- Host-tunable defaults (override per host in bootstrap/host_vars/<host>.yml) -
# Sensible defaults so a fresh checkout renders without host_vars; real machines
# override what differs. host_vars > group_vars, so the override always wins.
# Where the user keeps their music library — host-specific DATA, not a config path.
cmus_music_dir: "{{ target_home }}/Music"

# On the FIRST deploy to a machine, the dotfiles role copies any pre-existing real
# config to <file>.bak before replacing it (one time only, marker-tracked). Set
# false to skip backups entirely — then replaced configs are NOT saved.
dotfiles_backup: true

# --- Prebuilt binaries from GitHub releases (localbin role -> ~/.local/bin, no root)
# For tools not in apt. Each entry: name (the command installed), version (pinned),
# url (template; {ver}/{arch} filled in — {arch} via localbin_arch_map), member (the
# binary's path inside the archive), and optional: checksums (sha256 of the archive,
# keyed by arch token — verified on download); arch_map (per-entry uname->token map,
# for releases that name x86_64 differently, e.g. `amd64`); bash_completion (true to
# install `<name> completion bash`). A spin user makes this theirs by editing the
# list (add an entry / drop one / set [] for none) — data, not logic.
localbin_binaries:
  - name: bluetuith        # Bluetooth TUI (waybar bluetooth click-handler); not in apt
    version: "0.2.6"
    url: "https://github.com/bluetuith-org/bluetuith/releases/download/v{ver}/bluetuith_{ver}_Linux_{arch}.tar.gz"
    member: bluetuith
    checksums:             # sha256 of the tarball, per arch token
      x86_64: "f206731d16c446ade39907dc88f961ed3ef07a12911cf7432a2b768aefa62717"
      arm64: "63af4aae960c1754f8931c9022d926a29e9da6f82269c181d1726aad61312d92"

  - name: hcloud           # Hetzner Cloud CLI (infra provisioning/automation); not in apt
    version: "1.65.0"
    url: "https://github.com/hetznercloud/cli/releases/download/v{ver}/hcloud-linux-{arch}.tar.gz"
    member: hcloud
    arch_map: { x86_64: amd64, aarch64: arm64 }   # hcloud names x86_64 as `amd64`
    bash_completion: true
    checksums:
      amd64: "f78d2db65b7ab58603d343739cb4397e13acef23182e41692a06e147a8d4c011"
      arm64: "07de215486050692fe206368905dd677a1f2dd00f9b00af3a389ed301c2cca9b"

  - name: tofu             # OpenTofu (Cloudflare DNS as code — the IaC half of infra); not in apt
    version: "1.12.3"
    url: "https://github.com/opentofu/opentofu/releases/download/v{ver}/tofu_{ver}_linux_{arch}.zip"
    member: tofu
    arch_map: { x86_64: amd64, aarch64: arm64 }   # opentofu names x86_64 as `amd64`
    checksums:
      amd64: "46b48c3438c65cf479fc076c9281422ffa2f493548d1e813d154c835c5986a08"
      arm64: "b2110d1ce46e366ce861b7f53d293dad99080075629aed7fb50d7328916d91c2"

  - name: cf-terraforming  # export existing Cloudflare config -> Terraform/OpenTofu .tf (pairs with tofu); not in apt
    version: "0.27.0"
    url: "https://github.com/cloudflare/cf-terraforming/releases/download/v{ver}/cf-terraforming_{ver}_linux_{arch}.tar.gz"
    member: cf-terraforming
    arch_map: { x86_64: amd64, aarch64: arm64 }   # cf-terraforming names x86_64 as `amd64`
    checksums:
      amd64: "b0673abb7cd7ceda64146756917c99c36f234bb8e900c852a9901d9bfa4b66b4"
      arm64: "228e87760c24a571bd390acd77f9f272338d69a62c1605bd0015994489f9547d"

  # yazi + ya (its flavor/plugin CLI) — terminal file manager, part of the
  # file-manager EVALUATION set (gated: `enabled` rides enable_file_managers);
  # not in Debian apt. Both come from the SAME release zip; the asset name and
  # its top-level dir embed the full arch triple, hence the arch_map to triples
  # and the {arch} placeholder in `member`.
  - name: yazi
    version: "26.5.6"
    url: "https://github.com/sxyazi/yazi/releases/download/v{ver}/yazi-{arch}.zip"
    member: yazi-{arch}/yazi
    arch_map: { x86_64: x86_64-unknown-linux-gnu, aarch64: aarch64-unknown-linux-gnu }
    enabled: "{{ enable_file_managers | bool }}"
    checksums:
      x86_64-unknown-linux-gnu: "1c9096f0a83b8102c194385f644cdeff93cc8269426163c9d033041ebd537bd2"
      aarch64-unknown-linux-gnu: "c38b07961e7fc4c76503fd0f4a1b4bd0b379a99835b818cd899b0315c728e1e1"

  - name: ya
    version: "26.5.6"
    url: "https://github.com/sxyazi/yazi/releases/download/v{ver}/yazi-{arch}.zip"
    member: yazi-{arch}/ya
    arch_map: { x86_64: x86_64-unknown-linux-gnu, aarch64: aarch64-unknown-linux-gnu }
    enabled: "{{ enable_file_managers | bool }}"
    checksums:
      x86_64-unknown-linux-gnu: "1c9096f0a83b8102c194385f644cdeff93cc8269426163c9d033041ebd537bd2"
      aarch64-unknown-linux-gnu: "c38b07961e7fc4c76503fd0f4a1b4bd0b379a99835b818cd899b0315c728e1e1"

  # Wallpaper set (gated: `enabled` rides enable_wallpapers). None of these is in
  # Debian apt and none publishes prebuilt binaries (wpaperd/awww are cargo
  # builds; swww — awww's archived predecessor — is dead upstream), so the claude
  # agent builds them once (see the toggle comment above) and publishes the
  # stripped binaries as `raw:` assets on the hestia release `wallpapers-v1` —
  # x86_64-only until a rebuild adds arches. Runtime deps are all in Debian base
  # (awww: liblz4-1). (mpvpaper was dropped 2026-07 — the default engine is now
  # wpaperd on static stills; the video loop leaked memory, upstream mpv #15099.)
  - name: wpaperd          # wallpaper daemon — per-output slideshows, transitions
    version: "1.3.0"
    url: "https://github.com/dimitrios-git/hestia/releases/download/wallpapers-v1/wpaperd-{ver}-{arch}"
    raw: true
    enabled: "{{ enable_wallpapers | bool }}"
    checksums:
      x86_64: "33f07b9349cd73ecb64e818292f0f9515301c52af9d60d774f6474346d8378ba"

  - name: wpaperctl        # wpaperd's runtime control CLI (next/previous/pause/set)
    version: "1.3.0"
    url: "https://github.com/dimitrios-git/hestia/releases/download/wallpapers-v1/wpaperctl-{ver}-{arch}"
    raw: true
    enabled: "{{ enable_wallpapers | bool }}"
    checksums:
      x86_64: "21825cd6fc24ded16b635b11fd24ab7df71d8d0eacce0f645c3566722b929bc5"

  - name: awww             # animated-transition wallpaper client (swww successor)
    version: "0.12.1"
    url: "https://github.com/dimitrios-git/hestia/releases/download/wallpapers-v1/awww-{ver}-{arch}"
    raw: true
    enabled: "{{ enable_wallpapers | bool }}"
    checksums:
      x86_64: "8b3c6837db9713d33773427e6435009613b8a1da4532fcce930f99829e0cac1e"

  - name: awww-daemon      # awww's daemon half (start before `awww img`)
    version: "0.12.1"
    url: "https://github.com/dimitrios-git/hestia/releases/download/wallpapers-v1/awww-daemon-{ver}-{arch}"
    raw: true
    enabled: "{{ enable_wallpapers | bool }}"
    checksums:
      x86_64: "b01375a2bf5ff0a630ce5ecdcff6b70534eabe3ac8025b9183dc719035ccf520"

# --- apt packages, grouped by concern (deps documented across CLAUDE.md) -------
# Dependency-audited 2026-06-21 (swept every config for invoked binaries). Things
# that are NOT apt packages, or are heavy/optional, are listed in README.md /
# docs/install-runbook.md §8 (manual): NVIDIA driver, NVM/Node, vim-plug,
# bluetuith, Claude Code, **Tailscale** (own repo). (libreoffice is heavy but now
# an opt-in toggle — the gated `office` group below; Nerd Fonts are the `fonts` role.)
apt_packages:
  wayland:   [sway, swayidle, swaylock, waybar, mako-notifier, wofi, grim, slurp, wl-clipboard, brightnessctl, gammastep, playerctl, xwayland, breeze-cursor-theme, mate-polkit]   # gammastep: software gamma dim of all outputs as the pre-lock warning cue (no hardware backlight on this desktop). mate-polkit: the GTK PolicyKit auth agent — sway runs none by default, so GUI privilege prompts (nemo Open-as-Root, disk mounts, pkexec) are silently denied without it; started from the sway config
  portals:   [xdg-desktop-portal, xdg-desktop-portal-wlr, xdg-desktop-portal-gtk, pipewire, pipewire-pulse, wireplumber]
  terminal:  [kitty, vifm, tree, cmus, cava, glow, imv, zathura, mpv, bat, poppler-utils, mediainfo, 7zip, unzip, pulsemixer, htop, qalc, ncdu, ffmpegthumbnailer, imagemagick]   # bat: syntax-highlighted file preview in vifm (Debian installs it as `batcat`). chafa dropped — vifm no longer renders images in-pane (mediainfo info + imv to open). tree: directory tree viewer (companion to vifm). ffmpegthumbnailer + imagemagick: vifm's imv-browse.sh poster-frame thumbnails for videos (the ▶ overlay) — videos browse alongside images in imv
  editors:   [vim, neovim, build-essential, shellcheck, ripgrep]   # build-essential: nvim treesitter compiles parsers on first run; shellcheck: shell-script linter (neovim shell diagnostics + manual `shellcheck`); ripgrep: backs the vim content-grep keybind (coc-lists `:CocList grep` / `<leader>g`)
  vcs_gpg:   [git, gnupg, pinentry-tty]
  net_bt:    [network-manager, bluez, rfkill]   # rfkill: waybar bluetooth right-click toggle
  power:     [power-profiles-daemon]
  darkmode:  [dconf-cli, libglib2.0-bin, gsettings-desktop-schemas]
  fonts:     [fonts-noto-color-emoji]
  # acl is base, not in `sharing`: used by samba AND claude_user (shared-tree ACLs)
  # AND the claude-access tool, so it must survive `enable_samba=false`.
  misc:      [curl, dbus-bin, fontconfig, acl, udisks2, jq, iperf3, pigz]   # udisks2: waybar usb widget mount/unmount (udisksctl); jq: JSON CLI (sway IPC, scripting); iperf3: network throughput diagnostic (samba speed) — its server daemon is left disabled, see the packages role; pigz: parallel gzip (faster tar/archive compression)
  # --- feature-gated groups (installed only when their toggle is on, see below) ---
  sharing:      [samba]                        # enable_samba
  credentials:  [gnome-keyring, libsecret-tools]  # enable_credentials
  office:       [libreoffice, libreoffice-gtk3]  # enable_libreoffice (heavy, default off; -gtk3 = the GTK VCL plugin — without it LO renders via the grey 90s `gen` backend on XWayland, ignoring the hestia GTK theme entirely)
  video:        [kdenlive]                       # enable_kdenlive (heavy KF6/Qt6, default off; Qt-theming test target)
  email:        [thunderbird]                    # enable_thunderbird (default off; themed via user/thunderbird/)
  file_managers: [ranger, thunar, nemo, nautilus, krusader, dolphin]  # enable_file_managers (default off; evaluation set — yazi/ya ride localbin on the same toggle)
  image_viewers: [ristretto]                     # enable_image_viewers (default off; the evaluation keeper)
  wallpapers: []                                 # enable_wallpapers — no apt deps since mpvpaper (libmpv2) was dropped 2026-07; wpaperd/awww ride localbin, awww's liblz4-1 is Debian base

  # KDE's Qt platform-theme plugin: makes Qt apps read kdeglobals (the hestia scheme)
  # outside Plasma — start-sway exports QT_QPA_PLATFORMTHEME=kde when it's installed.
  # Needed by the KDE file managers (dolphin/krusader don't self-apply a scheme) and
  # useful to kdenlive too, hence the either-toggle gate below.
  qt_platform:  [plasma-integration]
  browser:      [chromium]                       # enable_headless_browser (headless dev/testing; also satisfies Playwright/Puppeteer runtime libs)
  claude:       [gh]                            # enable_claude_user — the agent's PR workflow (claude opens PRs, the human merges)
  firefox:      [firefox-esr]                    # enable_firefox (the desktop browser — see the toggle comment)

# Maps a feature-gated apt group -> its toggle. The `packages` role skips a group
# whose toggle is false, so a disabled feature doesn't drag in its packages.
# (Groups not listed here are core — always installed.)
package_group_features:
  sharing:     "{{ enable_samba | bool }}"
  credentials: "{{ enable_credentials | bool }}"
  office:      "{{ enable_libreoffice | bool }}"
  video:       "{{ enable_kdenlive | bool }}"
  email:       "{{ enable_thunderbird | bool }}"
  file_managers: "{{ enable_file_managers | bool }}"
  qt_platform: "{{ (enable_file_managers | bool) or (enable_kdenlive | bool) }}"
  image_viewers: "{{ enable_image_viewers | bool }}"
  wallpapers:  "{{ enable_wallpapers | bool }}"
  browser:     "{{ enable_headless_browser | bool }}"
  claude:      "{{ enable_claude_user | bool }}"
  firefox:     "{{ enable_firefox | bool }}"
