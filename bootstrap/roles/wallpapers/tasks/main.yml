---
# Download the selected mesh-flavour wallpaper assets (no root) — both variants
# for each resolution in wallpaper_resolutions, static PNG only. get_url with a
# checksum is idempotent: an existing, matching file is left alone. Switching
# wallpaper_flavour downloads the new set alongside the old (files are
# flavour-prefixed) and re-stamps the marker wallpaper.sh reads.
# (PNG-only since 2026-07: the default engine is wpaperd on the static frame —
# the .mp4 loops are no longer fetched after mpvpaper was dropped for its
# memory leak. The mp4 checksums stay in defaults as the release-asset record.)

- name: Ensure the backgrounds dir exists
  ansible.builtin.file:
    path: "{{ wallpapers_dir }}"
    state: directory
    mode: "0755"

- name: Download the {{ wallpaper_flavour }} assets (sha256-verified)
  ansible.builtin.get_url:
    url: "{{ wallpapers_base_url }}/{{ wallpaper_flavour }}-{{ item.0 }}-{{ item.1 }}.{{ item.2 }}"
    dest: "{{ wallpapers_dir }}/{{ wallpaper_flavour }}-{{ item.0 }}-{{ item.1 }}.{{ item.2 }}"
    checksum: "sha256:{{ wallpapers_sha256[wallpaper_flavour ~ '-' ~ item.0 ~ '-' ~ item.1 ~ '.' ~ item.2] }}"
    mode: "0644"
  loop: "{{ ['dark', 'light'] | product(wallpaper_resolutions, ['png']) | list }}"
  loop_control:
    label: "{{ wallpaper_flavour }}-{{ item.0 }}-{{ item.1 }}.{{ item.2 }}"

- name: Stamp the default-flavour marker (read by user/sway/wallpaper.sh)
  ansible.builtin.copy:
    content: "{{ wallpaper_flavour }}\n"
    dest: "{{ wallpapers_dir }}/default-flavour"
    mode: "0644"
