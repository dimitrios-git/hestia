---
# Top-level bootstrap playbook. Run from the bootstrap/ dir:
#   ansible-playbook site.yml --ask-become-pass            # full run
#   ansible-playbook site.yml --tags dotfiles --check      # dry-run just the symlinks
#
# `packages` + `dotfiles` are the core (always run). The optional roles are gated
# by `enable_*` feature toggles (group_vars/all.yml; the configurable-installer
# surface, docs/repo-structure-design.md §6) — set one false (host_vars or
# `-e enable_samba=false`) to skip it. Tags still let you run a slice.

- name: Bootstrap this machine from the dotfiles repo
  hosts: localhost
  connection: local
  gather_facts: false

  roles:
    - role: packages   # apt installs (needs --ask-become-pass)
      tags: [packages]
    - role: dotfiles   # symlinks + rendered templates into $HOME (no root)
      tags: [dotfiles]
    - role: fonts      # Nerd Fonts into ~/.local/share/fonts (no root)
      tags: [fonts]
    - role: localbin   # pinned prebuilt binaries (bluetuith) into ~/.local/bin (no root)
      tags: [localbin]
    - role: gtk_theme  # hestia GTK3 theme (recoloured adw-gtk3) into ~/.local/share/themes (no root)
      tags: [gtk_theme]
    - role: qt_theme   # hestia Qt/KDE colour scheme into ~/.config/kdeglobals + ~/.local/share/color-schemes (no root)
      tags: [qt_theme]
    - role: yaru_icons # build + install the #d7005f Yaru icon theme into ~/.local/share/icons (opt-in, heavy)
      tags: [yaru_icons]
      when: enable_yaru_icons | bool
    - role: vscode_theme # package + install the hestia VS Code theme (.vsix; no root) — self-skips when the `code` binary is absent (VS Code itself is not in the apt manifest)
      tags: [vscode_theme]
    - role: hostname   # set the machine hostname (pantheon scheme) — root
      tags: [system, hostname]
      when: system_hostname is defined
    - role: sway_session  # deploy /usr/local/bin/start-sway launcher (root)
      tags: [system, sway_session]
    - role: tailscale  # Tailscale mesh VPN from its own apt repo (root); `tailscale up` stays manual
      tags: [system, tailscale]
      when: enable_tailscale | default(true) | bool
    - role: samba      # layer-(a) system config: Samba share to /etc (root)
      tags: [system, samba]
      when: enable_samba | default(true) | bool
    - role: claude_user  # dedicated agent user + shared trees + repo ACLs
      tags: [claude, claude_user]
      when: enable_claude_user | default(true) | bool
    - role: credentials  # login auto-unlock launcher-untangle (SSH + GPG)
      tags: [credentials]
      when: enable_credentials | default(true) | bool
    - role: nvidia     # proprietary NVIDIA driver (non-free) — opt-in, needs reboot
      tags: [nvidia]
      when: enable_nvidia | default(false) | bool

# Site-local customisations — the personalization seam (docs/personalizing.md).
# Runs LAST, after the base system is in place. `bootstrap/local.yml` is an untracked
# (gitignored) Ansible TASKS file the user drops in to install their own software /
# add repos / run any task — see bootstrap/local.yml.example. Absent = no-op. Tasks
# with `become: true` reuse the sudo password setup.sh collected.
- name: Site-local customisations (untracked bootstrap/local.yml)
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [local]
  tasks:
    - name: Look for bootstrap/local.yml
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/local.yml"
      register: _local_tasks

    - name: Include site-local customisations if present
      ansible.builtin.include_tasks: "{{ playbook_dir }}/local.yml"
      when: _local_tasks.stat.exists
