---
# Install MEGA Desktop (MEGAsync) from MEGA's official signed apt repo — it is
# NOT in Debian apt (proprietary cloud-sync client). Root (become). Same
# vendor-repo shape as `chrome`/`firefoxpwa`/`tailscale`: add the signing key +
# a sources file, then apt-install.
#
# MEGA's repo is a FLAT apt repo (Release/Packages live at the repo root — hence
# the trailing `./` in the sources line, not a dists/ tree), built on the
# openSUSE Build Service and published per Debian release (…/repo/Debian_13/).
# We auto-detect the running Debian version from /etc/os-release so the path
# tracks the machine (Debian_13 on trixie) instead of hardcoding it.
#
# The signing key ships ASCII-armored and apt (trixie) accepts armored .asc
# keyrings in signed-by, so no dearmor step (like chrome/firefoxpwa). Expected
# key: MegaLimited <support@mega.co.nz>, fingerprint
#   B01C 8118 8048 0C85 4C73  EC7E 1A66 4B78 7094 A482   (rsa4096, exp 2032-01-10)
#
# The repo publishes amd64 AND arm64 (unlike chrome's amd64-only), so the role
# runs on both and self-skips other arches (i386/armhf have no vendor build).
#
# INSTALL ONLY. Signing into your MEGA account and pointing a synced folder at
# your storage location (e.g. /mnt/cloud-data/files/MEGA) is configured IN-APP
# on first launch and stays manual — like smbpasswd / `tailscale up`. See the
# role README and install-runbook §8.

- name: Detect the dpkg architecture
  ansible.builtin.command: dpkg --print-architecture
  register: _mega_arch
  changed_when: false

- name: "mega: no vendor build for this arch -> skip"
  ansible.builtin.debug:
    msg: "MEGA Desktop ships amd64/arm64 only — skipping on {{ _mega_arch.stdout }}."
  when: _mega_arch.stdout not in ['amd64', 'arm64']

- name: Install MEGA Desktop from the vendor apt repo
  when: _mega_arch.stdout in ['amd64', 'arm64']
  block:
    - name: Detect the Debian release (for the MEGA repo path)
      ansible.builtin.shell: . /etc/os-release && echo "${VERSION_ID%%.*}"
      register: _mega_debver
      changed_when: false

    - name: Install the MEGA apt signing key (armored)
      ansible.builtin.get_url:
        url: "https://mega.nz/linux/repo/Debian_{{ _mega_debver.stdout }}/Release.key"
        dest: /usr/share/keyrings/meganz.asc
        owner: root
        group: root
        mode: "0644"
      become: true

    - name: Add the MEGA apt repository (flat repo — note the trailing ./)
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/megasync.list
        content: >-
          deb [arch={{ _mega_arch.stdout }} signed-by=/usr/share/keyrings/meganz.asc]
          https://mega.nz/linux/repo/Debian_{{ _mega_debver.stdout }}/ ./
        owner: root
        group: root
        mode: "0644"
      become: true

    # The megasync .deb's own postinst self-registers a SECOND apt source entry
    # for this same repo URL (its own keyring, e.g. /etc/apt/keyrings/meganz-
    # archive-keyring.gpg) so plain `apt upgrade` picks up new MEGAsync builds.
    # That collides with our managed megasync.list on the next run — apt refuses
    # two entries for one URL with different Signed-By ("Conflicting values set
    # for option Signed-By"), and `apt update` fails outright. Sweep for and
    # drop any OTHER file referencing the MEGA repo before every update_cache,
    # keeping megasync.list (ours) as the single source of truth.
    - name: Find vendor-added duplicate MEGA apt source files
      ansible.builtin.shell: >-
        find /etc/apt/sources.list.d -maxdepth 1 -type f \( -name '*.list' -o -name '*.sources' \)
        -exec grep -l 'mega\.nz/linux/repo' {} \; 2>/dev/null
        | grep -vxF /etc/apt/sources.list.d/megasync.list || true
      register: _mega_dup_sources
      changed_when: false
      become: true

    - name: Remove vendor-added duplicate MEGA apt source files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ _mega_dup_sources.stdout_lines }}"
      become: true

    - name: Install MEGA packages (refresh the cache so the new repo is seen)
      ansible.builtin.apt:
        name: "{{ mega_packages }}"
        state: present
        update_cache: true
      become: true
