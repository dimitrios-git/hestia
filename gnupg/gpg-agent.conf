# pinentry-tty: plain prompt for when YOU commit in an interactive terminal
# (no curses/mouse-tracking, so it won't collide with TUIs / Claude Code).
pinentry-program /usr/bin/pinentry-tty

# Let the login-time credential-unlock hook warm the agent with the passphrase
# read from the gnome-keyring Secret Service: a loopback sign caches it in the
# normal (signing) cache. See docs/credential-autounlock-design.md.
allow-loopback-pinentry
allow-preset-passphrase

# Passphrase cache lifetime — effectively the whole login session (~400 days).
# With login auto-unlock (the credential-unlock hook warms the agent at login),
# the security boundary is the unlocked login session + screen lock, NOT this
# TTL — so GPG matches ssh-agent's "loaded until logout" behaviour. The agent
# dies on logout/reboot, which clears the cache; the hook re-warms at next login.
# A long TTL covers multi-day active sessions and does NOT assume the user keeps
# screen locking on (important for the spin). The lock — not the TTL — is the
# control for an unattended unlocked session. See docs/credential-autounlock-design.md.
default-cache-ttl 34560000
max-cache-ttl 34560000
