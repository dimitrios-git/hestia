# GTK 4 settings. libadwaita ignores gtk-theme-name (Adwaita is built in) and takes its
# light/dark cue from the portal color-scheme (set to prefer-dark at login by sway), so we
# only nudge prefer-dark here as a fallback; the accent recolour is in gtk.css.
[Settings]
gtk-application-prefer-dark-theme=1
gtk-icon-theme-name=Adwaita
