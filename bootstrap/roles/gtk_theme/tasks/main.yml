---
# Install the hestia GTK3 theme: the pinned adw-gtk3 release with its accent recoloured to
# gtk_theme_accent, installed as ~/.local/share/themes/hestia and hestia-dark. The theme is
# selected via gsettings gtk-theme=hestia-dark (a sway exec at login); this role only
# builds/installs it. No root, no compiler. See docs/theming.md.
#
# Idempotent: re-installs only when the dark variant is missing OR the (version, accent)
# marker is absent — so bumping gtk_theme_adw_version or gtk_theme_accent forces a rebuild,
# and a manual `rm` of the theme also re-installs.

- name: Install the hestia GTK theme (adw-gtk3 recoloured to the hestia accent)
  vars:
    _gt_marker: "{{ target_home }}/.local/state/hestia/gtk-theme/hestia-adw{{ gtk_theme_adw_version }}-{{ gtk_theme_accent | regex_replace('#', '') }}"
  block:
    - name: Is the hestia-dark theme + (version, accent) marker present?
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ target_home }}/.local/share/themes/hestia-dark/gtk-3.0/gtk.css"
        - "{{ _gt_marker }}"
      register: _gt_present

    - name: Download, recolour + install the hestia GTK theme
      when: not (_gt_present.results | map(attribute='stat.exists') | min)
      block:
        - name: Temp workdir
          ansible.builtin.tempfile:
            state: directory
            suffix: hestia-gtk-theme
          register: _gt_tmp

        - name: Download adw-gtk3 v{{ gtk_theme_adw_version }} (sha256-verified)
          ansible.builtin.get_url:
            url: "{{ gtk_theme_adw_url }}"
            dest: "{{ _gt_tmp.path }}/adw-gtk3.tar.xz"
            checksum: "sha256:{{ gtk_theme_adw_sha256 }}"
            mode: "0644"

        - name: Extract adw-gtk3
          ansible.builtin.unarchive:
            src: "{{ _gt_tmp.path }}/adw-gtk3.tar.xz"
            dest: "{{ _gt_tmp.path }}"
            remote_src: true

        - name: Ensure ~/.local/share/themes exists
          ansible.builtin.file:
            path: "{{ target_home }}/.local/share/themes"
            state: directory
            mode: "0755"

        - name: Install the adw-gtk3 variants as hestia / hestia-dark
          ansible.builtin.copy:
            src: "{{ _gt_tmp.path }}/{{ item.src }}/"
            dest: "{{ target_home }}/.local/share/themes/{{ item.dest }}/"
            remote_src: true
            mode: preserve
          loop:
            - { src: adw-gtk3, dest: hestia }
            - { src: adw-gtk3-dark, dest: hestia-dark }

        - name: Recolour the accent to the hestia palette ({{ gtk_theme_accent }})
          ansible.builtin.replace:
            path: "{{ target_home }}/.local/share/themes/{{ item }}"
            regexp: '@define-color accent_bg_color @blue_3;'
            replace: "@define-color accent_bg_color {{ gtk_theme_accent }};"
          loop:
            - hestia/gtk-3.0/gtk.css
            - hestia/gtk-3.0/gtk-dark.css
            - hestia-dark/gtk-3.0/gtk.css
            - hestia-dark/gtk-3.0/gtk-dark.css

        - name: Verify the accent baked in (catches an upstream CSS format change on bump)
          ansible.builtin.command: >-
            grep -q '{{ gtk_theme_accent }}' "{{ target_home }}/.local/share/themes/hestia-dark/gtk-3.0/gtk.css"
          changed_when: false

        - name: Ensure the gtk-theme state dir exists (for the marker)
          ansible.builtin.file:
            path: "{{ _gt_marker | dirname }}"
            state: directory
            mode: "0755"

        - name: Record the (version, accent) marker
          ansible.builtin.file:
            path: "{{ _gt_marker }}"
            state: touch
            mode: "0644"
      always:
        - name: Remove the temp workdir
          ansible.builtin.file:
            path: "{{ _gt_tmp.path | default('') }}"
            state: absent
          when: _gt_tmp.path is defined

# adw-gtk3 ships a gtk-4.0/ (gtk.css → @import libadwaita.css + libadwaita-tweaks.css,
# a pinned copy of libadwaita's own stylesheet). On a mismatched GTK4 those @-rules fail
# to parse ("Unknown @ rule", hundreds of them), so a GTK4/libadwaita app that loads
# GTK_THEME=hestia-dark gets a BROKEN theme and falls back to LIGHT — ignoring the dark
# color-scheme (seen live on file-roller's Compress dialog from nemo). hestia's GTK4
# strategy is Adwaita + the portal color-scheme (docs/theming.md), NOT adw-gtk3 for GTK4,
# so drop the theme's gtk-4.0 entirely: GTK4 apps then fall through to built-in Adwaita
# and follow prefer-dark, while GTK3 apps keep their gtk-3.0. Unconditional (state:absent
# is a no-op once gone) so already-installed themes are fixed without a full rebuild.
- name: Strip the theme's gtk-4.0 (adw-gtk3's copy breaks libadwaita apps into light)
  ansible.builtin.file:
    path: "{{ target_home }}/.local/share/themes/{{ item }}/gtk-4.0"
    state: absent
  loop:
    - hestia
    - hestia-dark
