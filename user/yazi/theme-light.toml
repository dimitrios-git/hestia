# File-type rules — from render.py's shared filetype_colors() table (the same
# one vifm's colorscheme and ~/.dircolors render from, so all three agree).
[filetype]
rules = [
    { fg = "#d40880" , mime = "image/*" },
    { fg = "#be0772" , mime = "video/*" },
    { fg = "#076d76" , mime = "audio/*" },
    { fg = "#d11800" , mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}" },
    { fg = "#af5f00" , mime = "application/{pdf,doc,rtf}" },
    { fg = "#d11800", crossed = true , url = "*", is = "orphan" },
    { fg = "#237133" , url = "*", is = "exec" },
    { fg = "#ffffff", bg = "#9b0040" , url = "*", is = "dummy" },
    { fg = "#ffffff", bg = "#9b0040" , url = "*/", is = "dummy" },
    { fg = "#005faf", bold = true , url = "*/" },
]
