# hestia ranger config (file-manager evaluation — see CLAUDE.md TODO). Loads
# ON TOP of ranger's defaults (RANGER_LOAD_DEFAULT_RC stays 1), so only the
# overrides live here.

# The GENERATED wildcharm colorscheme (render.py pair; the bootstrap symlinks
# the theme_variant one to colorschemes/wildcharm.py, so this is variant-blind).
set colorscheme wildcharm

# kitty graphics protocol — ranger can render image previews in-pane on this
# terminal (the thing vifm can't do; part of what the evaluation is comparing).
set preview_images true
set preview_images_method kitty
