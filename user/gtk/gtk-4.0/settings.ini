# GTK 4 settings. libadwaita ignores gtk-theme-name (Adwaita is built in) and takes its
# light/dark cue from the portal color-scheme (set to prefer-dark at login by sway) — NOT
# from gtk-application-prefer-dark-theme, which libadwaita explicitly warns is unsupported,
# so we don't set it here. The accent recolour is in gtk.css.
[Settings]
# Yaru-hestia = the #7c3aed-accent Yaru icon theme (opt-in yaru_icons role); absent
# without it -> GTK falls back to a default icon theme.
gtk-icon-theme-name=Yaru-hestia
