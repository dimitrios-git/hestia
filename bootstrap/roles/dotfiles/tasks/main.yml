---
# Deploy user configs from the manifest: symlink the plain ones, render the
# path-generalised `templated_configs` (.j2 → no hardcoded /home/<user>).
# Idempotent: re-running is a no-op when links/renders are already correct. Runs as
# the invoking user (no become) — these live in $HOME. Replaces the manual `ln -s`.

# ~/.gnupg must be 0700 or gpg refuses to use it. Set explicitly (and only here —
# the generic parent-dir task below does NOT manage mode, so it never downgrades
# sensitive dirs like ~/.gnupg or the 0750 home).
- name: Ensure ~/.gnupg exists with gpg-safe perms
  ansible.builtin.file:
    path: "{{ target_home }}/.gnupg"
    state: directory
    mode: "0700"

# Create any missing parent dirs WITHOUT touching mode of existing ones. Omitting
# `mode` is deliberate: existing dirs keep their perms (so the 0750 home and any
# 0700 dirs are preserved); new dirs are created at the user's umask. Deduped so
# shared parents (e.g. $HOME, ~/.config/waybar) aren't revisited.
- name: Ensure parent directories of dotfiles exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
  loop: "{{ (dotfile_links + templated_configs) | map(attribute='dest') | map('dirname') | unique | list }}"
  loop_control:
    label: "{{ item }}"

# Safety net: the symlink/template tasks below force-replace whatever sits at each
# dest. ONE TIME — on the very first deploy to this machine — copy each pre-existing
# REAL file (a user's own config, not a symlink) to <file>.bak next to itself, then
# drop a marker so it never runs again (no accumulation, no backing up our own
# renders later). Toggle the *copy* with `dotfiles_backup` (default true).
#
# The whole block is gated only on the MARKER (first deploy), and the marker is
# dropped UNCONDITIONALLY at the end — even when `dotfiles_backup` is false. That's
# the fix for the original bug: if the copy step were what dropped the marker, a
# first deploy run with `--no-backup` would skip it, leaving the one-time window
# OPEN — so the next normal run would "back up" our own freshly-rendered configs
# (.gitconfig, glow.yml, …) to <file>.bak. Closing the window regardless prevents
# that. Net: exactly one .bak per pre-existing config, and only ever on first deploy.
- name: Has the one-time pre-hestia config backup already run?
  ansible.builtin.stat:
    path: "{{ target_home }}/.local/state/hestia/.dotfiles-backed-up"
  register: _backup_marker

- name: One-time pre-hestia config backup (first deploy only — marker-gated)
  when: not _backup_marker.stat.exists
  block:
    - name: Stat every config destination
      ansible.builtin.stat:
        path: "{{ item.dest }}"
      loop: "{{ dotfile_links + templated_configs }}"
      loop_control:
        label: "{{ item.dest }}"
      register: _all_dests

    # Gated on dotfiles_backup: with `--no-backup` this is skipped, but the marker
    # below still drops, so the one-time window closes either way.
    - name: Copy any pre-existing real config to <file>.bak (never clobber one)
      ansible.builtin.copy:
        src: "{{ item.item.dest }}"
        dest: "{{ item.item.dest }}.bak"
        remote_src: true
        mode: preserve
        force: false
      loop: "{{ _all_dests.results }}"
      loop_control:
        label: "{{ item.item.dest }} -> {{ item.item.dest }}.bak"
      when:
        - dotfiles_backup | default(true) | bool
        - item.stat.exists and item.stat.isreg and not item.stat.islnk
        # Skip seed-once (force:false) items: we never replace them, so backing up
        # the user's own file would leave a puzzling .bak of an untouched config.
        - item.item.force | default(true) | bool

    - name: Ensure the hestia state dir exists (for the marker)
      ansible.builtin.file:
        path: "{{ target_home }}/.local/state/hestia"
        state: directory

    - name: Drop the one-time backup marker (always — even with --no-backup)
      ansible.builtin.file:
        path: "{{ target_home }}/.local/state/hestia/.dotfiles-backed-up"
        state: touch
        mode: "0644"

- name: Symlink dotfiles from the repo
  ansible.builtin.file:
    src: "{{ repo_root }}/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true            # replace a pre-existing plain file/wrong link
  loop: "{{ dotfile_links }}"
  loop_control:
    label: "{{ item.src }} -> {{ item.dest }}"

# Path-generalised configs (docs/repo-structure-design.md §5): rendered from a .j2
# so no /home/<user> literal is baked in. `force` defaults to true — replaces a
# pre-existing file/symlink (e.g. an older deploy that symlinked glow.yml) with the
# rendered file. An item can set `force: false` to SEED ONCE instead: render only
# when the dest is absent, and never overwrite a user's own file on re-run (the
# `claude` settings.json, which users personalise — see the manifest note).
- name: Render templated configs from the manifest
  ansible.builtin.template:
    src: "{{ repo_root }}/{{ item.src }}"
    dest: "{{ item.dest }}"
    force: "{{ item.force | default(true) | bool }}"
    mode: "{{ item.mode | default('0644') }}"   # scripts that get executed need 0755
  loop: "{{ templated_configs }}"
  loop_control:
    label: "{{ item.src }} -> {{ item.dest }}"

# bat compiles the .tmTheme files under ~/.config/bat/themes into its binary
# cache; without this build `--theme=hestia` (used by vifm's preview and the
# bat config) isn't found and bat silently falls back to its default theme. On
# Debian the binary is `batcat`. Runs after the theme link above (no become —
# the cache lives in ~/.cache/bat). Rebuilding a derived cache is idempotent in
# effect, so it's marked not-changed to avoid a spurious 'changed' every run.
- name: Find the bat binary (Debian ships it as batcat)
  ansible.builtin.shell: "command -v batcat || command -v bat || true"
  register: _bat_bin
  changed_when: false

# A single BROKEN symlink in the themes dir makes `bat cache --build` abort the
# WHOLE directory scan ("Failed to load one or more themes … No such file or
# directory") and fall back to the default theme set — so `--theme=hestia`
# reports "Unknown theme". This bites on migration: when a theme file is renamed
# in the repo (e.g. the wildcharm -> hestia rename), the Symlink task adds the
# new link but never removes the old one, which orphans into a dangling link.
# Prune any dangling links here (find -xtype l = broken symlinks) so the build
# below always sees a clean dir. Scoped to the bat themes dir on purpose — a
# broken link elsewhere is harmless; only bat fails the whole scan on one.
- name: Prune dangling theme symlinks left by renames (a broken link makes bat skip the whole dir)
  ansible.builtin.command:
    cmd: find {{ target_home }}/.config/bat/themes -maxdepth 1 -xtype l -print -delete
  register: _bat_pruned
  changed_when: _bat_pruned.stdout | length > 0
  failed_when: false

- name: Build bat's theme cache so the hestia theme is available
  ansible.builtin.command: "{{ _bat_bin.stdout }} cache --build"
  when: _bat_bin.stdout | length > 0
  changed_when: false

# Thunderbird theming rides its own task file: the profile dir is randomized,
# so the dests are GLOBBED rather than listed in the fixed-dest manifest above
# (self-skips when no profile exists yet).
- name: Deploy Thunderbird theming into existing profiles
  ansible.builtin.import_tasks: thunderbird.yml
