# themes/wildcharm/palette.yml — the single source of truth for hestia's theme.
#
# hestia is based on the `wildcharm` vim colorscheme (Maxim Kim, in the official
# vim/colorschemes repo; palette derived from "quiet" by @neutaaaaan) — a dark,
# saturated 16-colour scheme bundled with Vim. hestia adopts wildcharm's DARK
# palette, with a few deliberate, documented deviations:
#   - bg softened to near-black #0a0a0a (wildcharm uses pure #000000);
#   - dim/muted lightened so secondary/tertiary text clears WCAG AA on these
#     surfaces (wildcharm's greys are tuned against #000000);
#   - accent_fg + link roles added (text ON the accent fill; accent-coloured text).
# The accent is wildcharm's own red #d7005f — NOT Debian red #ce0056, which was
# dropped so the theme is uniform with, and original to, the scheme it is built
# on. Every app config in this repo draws its colours from the values below.
#
# This file is currently applied BY HAND — when theming an app you read the right
# value here and write the literal hex into that app's config (see docs/theming.md
# for the per-app process). The file is structured as plain data so a future
# Ansible/Jinja2 render can consume it verbatim and stop the hand-copying
# (docs/repo-structure-design.md §9.3, still deferred). Until then this is the
# reference, not a deployed input.
#
# Edit a colour HERE first; then propagate it to the consuming configs. Hex values
# carry a leading '#'; strip it for tools that want bare RRGGBB (e.g. swaylock).
#
# The dark/light + cross-platform syntax-highlighting plan (layer model, decision
# log, milestones, known-inconsistency backlog) is docs/theme-roadmap.md.

# Palette contract version (see docs/theme-roadmap.md "Versioning") — bump minor
# when roles/values are added, patch for a tweak; log one line in the roadmap.
version: "0.2.0"

# Semantic roles — what a colour MEANS. Prefer these names when theming GUI apps
# (sway already mirrors them as $bg/$surface/$border/$text/$dim/$accent).
roles:
  bg:          "#0a0a0a"   # window / canvas background (the near-black base)
  surface:     "#111111"   # raised panels, inputs, the inside of indicators
  surface_alt: "#1a1a1a"   # code blocks, hover rows (also ANSI black, color0)
  border:      "#1e1e1e"   # separators, idle borders
  text:        "#e0e0e0"   # primary foreground
  dim:         "#8c8c8c"   # tertiary text / hints — wildcharm #767676 lightened for AA on surfaces
  muted:       "#adadad"   # secondary text (e.g. unfocused workspaces) — kept above dim for an even ramp
  accent:      "#d7005f"   # wildcharm red (ANSI color01) — focus, highlights, FILL (== ANSI red)
  accent_dark: "#9b0040"   # darker accent, for urgent borders / sunken red fills
  accent_fg:   "#ffffff"   # text ON the accent fill (status bars, selection, focus) — AA at 5.18:1
  link:        "#ff5f87"   # accent-coloured TEXT (wildcharm bright_red, color09) — AA on the dark surfaces
  white:       "#ffffff"   # max-contrast text

# The 16-colour ANSI palette (wildcharm). Terminal apps map their colour slots to
# these (kitty defines the canonical set; cmus/cava/vifm track it). Index in [].
ansi:
  black:          "#1a1a1a"   # [0]
  red:            "#d7005f"   # [1]  the accent (wildcharm color01)
  green:          "#00af5f"   # [2]
  yellow:         "#d78700"   # [3]
  blue:           "#0087d7"   # [4]
  magenta:        "#d787d7"   # [5]
  cyan:           "#00afaf"   # [6]
  white:          "#d0d0d0"   # [7]
  bright_black:   "#767676"   # [8]
  bright_red:     "#ff5f87"   # [9]
  bright_green:   "#00d75f"   # [10]
  bright_yellow:  "#ffaf00"   # [11]
  bright_blue:    "#00afff"   # [12]
  bright_magenta: "#ff87ff"   # [13]
  bright_cyan:    "#00d7d7"   # [14]
  bright_white:   "#ffffff"   # [15]

# Colours wildcharm uses beyond the ANSI 16 (xterm-256 indices) — upstream
# values admitted under the never-invent rule, not new shades.
extended:
  purple: "#af5fff"   # xterm 135 — wildcharm's Special/Todo purple (#875fff, xterm 99)
                      # lifted one 256-palette step for AA on hestia surfaces
                      # (4.24:1 on surface_alt -> 4.89:1; same treatment as roles.dim)

# Syntax-highlighting roles (layer 2 — docs/theme-roadmap.md). What a colour
# means IN CODE, resolved from the palette above; the canonical mapping is the
# wildcharm.vim DARK variant (decision 2026-07-03), with hestia's documented
# deviations (comment on dim; bg/default text come from roles, not upstream's
# pure #000000/#d0d0d0). Every syntax consumer (vim, bat tmTheme, Shiki/VS Code,
# glow) renders FROM this table — never map a scope to a hex an artifact invents.
# Anything not listed renders as roles.text (vim leaves it Normal — this
# includes plain variables and punctuation). A light: resolution of the same
# role names lands with milestone 3 (upstream source table is in the roadmap).
syntax:
  comment:        "#8c8c8c"   # roles.dim — upstream #767676 lightened for AA (documented deviation)
  string:         "#00d75f"   # ansi.bright_green — vim String
  string_special: "#af5fff"   # extended.purple — escapes/regex (vim SpecialChar -> Special)
  constant:       "#ff5f87"   # ansi.bright_red — numbers, booleans, chars (vim Constant)
  identifier:     "#ff87ff"   # ansi.bright_magenta — functions + members (vim Identifier/Function)
  keyword:        "#00afff"   # ansi.bright_blue — statements, operators, storage (vim Statement)
  type:           "#ffaf00"   # ansi.bright_yellow — types, classes (vim Type)
  preproc:        "#00d7d7"   # ansi.bright_cyan — imports, macros, at-rules (vim PreProc)
  special:        "#af5fff"   # extended.purple — delimiters, tags, specials (vim Special)
  diff_add:       "#00af5f"   # ansi.green — vim Added
  diff_change:    "#0087d7"   # ansi.blue — vim Changed
  diff_delete:    "#ff5f87"   # ansi.bright_red — deviation: upstream Removed is #d7005f, but the
                              # accent is a FILL in hestia; bright_red is the accent-coloured TEXT
                              # (roles.link) and is what git diff + the bat theme already use
  # error/todo are REVERSE/FILL treatments (the colour is a background or is
  # reversed), not plain foreground text — the AA-vs-surface rule above doesn't
  # apply to them; platform mappings pair error with white/accent_fg.
  error:          "#d7005f"   # roles.accent — vim Error (reverse on white; bat: white on accent_dark)
  todo:           "#af5fff"   # extended.purple — vim Todo (rendered reverse)
