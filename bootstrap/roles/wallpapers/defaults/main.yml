---
# Mesh wallpaper assets (themes/plain-mesh/ is the render harness; the
# wallpaper-evaluation verdict made the mesh the default background — painted by
# wpaperd from the static per-variant PNGs since 2026-07, when the original
# mpvpaper VIDEO loop was dropped for an unfixed upstream mpv memory leak). Only
# the PNG frame is fetched now; the .mp4 loops were removed from the release
# assets too (nothing plays them), so the checksums below are PNG-only.
# Downloaded per host from a hestia release, sha256-verified; get_url is
# self-idempotent (existing files are checksum-matched, not re-downloaded).
# A new render = new release tag + refreshed checksums here.

# Which flavour this host runs: flash-mesh (THE hestia default since 2026-07 —
# accent flashes firing through the lattice, the approved tuning) or plain-mesh
# (the quiet no-flash alternative). Override per host in host_vars; the role
# downloads THAT flavour's assets and stamps it into the default-flavour
# marker user/sway/wallpaper.sh reads. Each flavour lives on its own release
# tag (<flavour>-v<n>) and versions INDEPENDENTLY — flash-mesh went v2 with the
# accent red->violet flip (0.10.0), plain-mesh (no flashes, accent-independent)
# stays v1. Bump a flavour's version here on a re-render.
wallpaper_flavour: flash-mesh

wallpaper_flavour_versions:
  flash-mesh: v2
  plain-mesh: v1

wallpapers_base_url: "https://github.com/dimitrios-git/hestia/releases/download/{{ wallpaper_flavour }}-{{ wallpaper_flavour_versions[wallpaper_flavour] }}"
wallpapers_dir: "{{ target_home }}/.local/share/backgrounds/hestia"

# Which resolutions to fetch — BOTH variants each, static PNG only (the frame
# wpaperd paints; the .mp4 loops are no longer fetched, see tasks/main.yml).
# Trim per host in host_vars; user/sway/wallpaper.sh falls back to the largest
# installed file when an output's exact resolution is missing (wpaperd scales).
wallpaper_resolutions: [1920x1080, 1920x1200, 2560x1440, 2560x1600, 3840x2160, 1200x1920]

# sha256 per release asset, ALL flavours in one dict (filled by each render
# publish; regenerate with `sha256sum <flavour>-mesh-*` in the render outdir)
