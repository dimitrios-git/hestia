# themes/hestia/palette.yml — the single source of truth for hestia's theme.
#
# hestia is based on the `wildcharm` vim colorscheme (Maxim Kim, in the official
# vim/colorschemes repo; palette derived from "quiet" by @neutaaaaan) — a dark,
# saturated 16-colour scheme bundled with Vim. hestia adopts wildcharm's DARK
# palette as its default look; a LIGHT variant (from upstream's
# background=light branch) lives in the `light:` section below and, since M7,
# can drive the whole desktop via the bootstrap's `theme_variant` switch
# (dark|light in host_vars — see docs/theme-roadmap.md M7). Dark deviations:
#   - the ground lifted to #1a1a1a (wildcharm uses pure #000000; hestia used
#     near-black #0a0a0a until the bg-lift verdict, 2026-07 / 0.5.0);
#   - dim/muted lightened so secondary/tertiary text clears WCAG AA on these
#     surfaces (wildcharm's greys are tuned against #000000);
#   - accent_fg + link roles added (text ON the accent fill; accent-coloured text).
# The accent is VIOLET #7c3aed (tci's brand accent, adopted 0.10.0). The wildcharm
# red #d7005f it replaced lives on — retuned to a TRUE red #d70000 (0.10.1) — as
# the `danger` role + ANSI color1 (it read pink/magenta at #d7005f; #d70000 is a
# clearer red, and matches the light variant's existing red). Debian red #ce0056
# was the accent until 2026-06. Every app config draws its colours from below.
#
# This file is currently applied BY HAND — when theming an app you read the right
# value here and write the literal hex into that app's config (see docs/theming.md
# for the per-app process). The file is structured as plain data so a future
# Ansible/Jinja2 render can consume it verbatim and stop the hand-copying
# (docs/repo-structure-design.md §9.3, still deferred). Until then this is the
# reference, not a deployed input.
#
# Edit a colour HERE first; then propagate it to the consuming configs. Hex values
# carry a leading '#'; strip it for tools that want bare RRGGBB (e.g. swaylock).
#
# The dark/light + cross-platform syntax-highlighting plan (layer model, decision
# log, milestones, known-inconsistency backlog) is docs/theme-roadmap.md.

# Palette contract version (see docs/theme-roadmap.md "Versioning") — bump minor
# when roles/values are added, patch for a tweak; log one line in the roadmap.
version: "0.10.1"

# Semantic roles — what a colour MEANS. Prefer these names when theming GUI apps
# (sway already mirrors them as $bg/$surface/$border/$text/$dim/$accent).
#
# The ground was lifted #0a0a0a -> #1a1a1a in 0.5.0 (the bg-lift verdict,
# 2026-07-03): the code-block surface everyone kept preferring BECAME the
# ground, and the surface ramp rebuilt above it on xterm-native greys (235/
# 236/237 — losslessly downsample, and 235 is wildcharm.vim's own CursorLine).
# Note bg == ANSI color0 now — accepted; watch item in the roadmap backlog.
roles:
  bg:          "#1a1a1a"   # window / canvas ground (== ANSI color0); ALSO the web
                           # code-block surface — it sits raised on tci's darker page
  surface:     "#262626"   # raised panels, inputs, code blocks inside terminal docs
                           # (glow) — xterm 235, wildcharm's CursorLine grey
  surface_alt: "#303030"   # hover rows, line highlight, alternate rows, tooltips —
                           # xterm 236. Transient surfaces: body text on it is
                           # text/muted only (dim is 3.92:1 here — below AA)
  border:      "#3a3a3a"   # separators, idle borders — xterm 237
  text:        "#e0e0e0"   # primary foreground
  dim:         "#8c8c8c"   # tertiary text / hints — wildcharm #767676 lightened for AA;
                           # AA holds on bg (5.18) and surface (4.50) — not surface_alt
  muted:       "#adadad"   # secondary text (e.g. unfocused workspaces) — kept above dim for an even ramp
  accent:      "#7c3aed"   # VIOLET (0.10.0) — focus, highlights, selection, FILL. tci's
                           # default UI accent, moved red->purple: "easier on the eye" for
                           # every button/focus/highlight than a saturated pink-red. The
                           # fill-tuned shade of the brand purple (#8b5cf6 is the syntax
                           # source; as a FILL with white text it's only 4.23:1 — fails AA
                           # — so the accent is the deeper #7c3aed: white-on 5.70:1). Same
                           # both variants (as accent TEXT it also clears the light ground,
                           # 5.23:1). NOTE: accent is NO LONGER ANSI color01 — that stays
                           # red (terminal git/errors); the accent==color1 invariant is
                           # retired here, deliberately (0.10.0 decision).
  accent_dark: "#5b21b6"   # darker violet — urgent-but-brand borders / sunken accent fills (white-on 8.98:1)
  accent_fg:   "#ffffff"   # text ON the accent fill (status bars, selection, focus) — AA at 5.70:1
  link:        "#9e77f7"   # accent-coloured TEXT on dark (violet; 5.33:1 on bg). Light uses
                           # the accent itself on the ground (5.23:1), as before.
  # DANGER (0.10.0) — the RED survives here, decoupled from the accent. Error,
  # critical/high-urgency notifications, destructive confirms and wrong-password
  # states stay red (universal "careful"); the brand/focus accent is violet. This
  # is the wildcharm red pair, now a semantic role of its own (both variants).
  danger:      "#d70000"   # error / critical / destructive-confirm / wrong-password FILL (white-on 5.40:1).
                           # A TRUE red (0.10.1) — the old #d7005f rose read pink/magenta in the power
                           # confirm; unified with ANSI color1 + syntax.error + the terminal reds so
                           # hestia has ONE red (matches the light variant, which already used #d70000).
  danger_dark: "#9b0000"   # darker danger — wrong-password inside, sunken danger fills
  white:       "#ffffff"   # max-contrast text

# The 16-colour ANSI palette. Terminal apps map their colour slots to these
# (kitty defines the canonical set; cmus/cava/vifm/dircolors track it). Index in
# []. SINCE 0.9.1 the chromatic slots a Memphis brand hue exists for are
# re-hued to it — the terminal counterpart of the 0.9.0 syntax re-anchor, closing
# the ANSI/syntax coherence gap (ls/cava/TUIs now read the brand too). Re-hued:
# green (2/10), magenta (5/13), cyan->teal (6/14), bright_red->coral (9); the
# LITERAL brand values land in the vivid slots (magenta #f725a0, teal #0cb2c0,
# coral #ff4f38). KEPT wildcharm as functional anchors: blue (4/12) + yellow
# (3/11) — Memphis has neither, and the terminal needs the warm/cool split.
# color1 is the terminal RED #d70000 (0.10.1 — was the accent #d7005f until the
# accent went violet 0.10.0; now unified with roles.danger onto a true red). Greys + black
# + white unchanged. Method mirrors syntax: keep the brand hue, tune lightness
# for legibility (base ~4.7 / bright ~6.8 on the dark ground). See roadmap 0.9.1.
ansi:
  black:          "#1a1a1a"   # [0]
  red:            "#d70000"   # [1]  terminal red (was the accent #d7005f; retired to violet 0.10.0, unified to a true red 0.10.1)
  green:          "#2f9844"   # [2]  brand.green, dark-tuned (4.72:1)
  yellow:         "#d78700"   # [3]  functional anchor (no brand yellow)
  blue:           "#0087d7"   # [4]  functional anchor (no brand blue)
  magenta:        "#f725a0"   # [5]  brand.magenta LITERAL (4.75:1)
  cyan:           "#0cb2c0"   # [6]  brand.teal LITERAL (6.75:1)
  white:          "#d0d0d0"   # [7]
  bright_black:   "#767676"   # [8]
  bright_red:     "#ff4f38"   # [9]  brand.coral LITERAL (5.33:1)
  bright_green:   "#3ab953"   # [10] brand.green, brighter (6.83:1)
  bright_yellow:  "#ffaf00"   # [11] functional anchor
  bright_blue:    "#00afff"   # [12] functional anchor
  bright_magenta: "#fa74c2"   # [13] brand.magenta, brighter (6.91:1)
  bright_cyan:    "#22cdda"   # [14] brand.teal, brighter (6.90:1)
  bright_white:   "#ffffff"   # [15]

# Colours wildcharm uses beyond the ANSI 16 (xterm-256 indices) — upstream
# values admitted under the never-invent rule, not new shades.
extended:
  purple: "#af87ff"   # xterm 141 — wildcharm's Special/Todo purple (#875fff, xterm 99)
                      # lifted for AA on ALL hestia dark surfaces (0.8.1 readability
                      # pass): the former xterm 135 #af5fff cleared the #1a1a1a ground
                      # (4.89) but DIPPED below AA on the raised greys (4.25 on #262626,
                      # 3.71 on #303030) — the only syntax hue that did. #af87ff lifts
                      # the green channel one cube step: 6.41 on bg, 5.57 on #262626,
                      # 4.86 on #303030 — AA everywhere. It stays a lavender-purple, ΔE
                      # 14.6 (CIEDE2000) from the magenta identifier #ff87ff (vs 17.2
                      # before — the brighten narrows the gap but the two still read
                      # apart at 13px; #bd93ff was rejected for closing it to 12.3).
  # wildcharm.vim UI-group greys, admitted 0.6.0 (they'd lived only in configs —
  # the roadmap backlog item). Consumers: vim devicons/NERDTree neutral icon grey
  # + vifm CurrLine (ui_grey), vifm Border/LineNr (line_grey).
  ui_grey:    "#9e9e9e"   # xterm 247
  line_grey:  "#585858"   # xterm 240 — wildcharm LineNr/StatusLineNC family
  # render-markdown's heading wash (vim), admitted retroactively 0.6.0 — a dark
  # accent-tinted bg, used as a FILL under accent-coloured heading text (violet
  # tint since 0.10.0, tracking the accent red->violet flip).
  heading_bg: "#150a24"
  # Below-ground fill (swaylock inside-circle, swaynag buttons/details, vifm
  # AuxWin — the miller parent-column shade; light AuxWin uses surface instead,
  # see render.py), admitted retroactively 0.7.0 — deliberately darker than bg,
  # no role equivalent.
  sunken:     "#111111"
  # Max-contrast text ON light fills (vifm/cmus cursor bars, WildMenu/TabLineSel
  # on the accent) — pure black, xterm 16. Variant-invariant (light fills are
  # light in both variants). Admitted 0.7.0 with the vifm/cmus generation.
  ink:        "#000000"

# The tci "Memphis" brand palette (source of the syntax hues since 0.9.0) — the
# five accent colours thecodingidiot has used since before hestia existed
# (apps/thecodingidiot/app/globals.css --color-*: the per-tier accents). hestia's
# syntax layer is now re-anchored on THESE hues — the identity move that made the
# code-highlighting "ours" rather than wildcharm's (decision 2026-07-10, 0.9.0).
# Variant-invariant SOURCE hues (they are lightness-corrected per ground in the
# syntax tables below — as UI accents they fail AA as 13px text; see the study).
# The two functional anchors (blue keyword, yellow type) have NO brand colour —
# the Memphis set carries no blue or yellow, and syntax needs that warm/cool
# split to scan — so they stay hestia-chosen, not brand.
brand:
  green:   "#2b8a3e"   # -> syntax.string
  teal:    "#0cb2c0"   # -> syntax.preproc  (the "cyan"/f-tier accent)
  magenta: "#f725a0"   # -> syntax.identifier (functions)  (c-tier accent)
  coral:   "#ff4f38"   # -> syntax.constant  (the "red"/g-tier accent)
  purple:  "#8b5cf6"   # -> syntax.special/string_special  (default-tier accent)

# Syntax-highlighting roles (layer 2 — docs/theme-roadmap.md). What a colour
# means IN CODE. SINCE 0.9.0 the hues come from the tci Memphis brand (above),
# NOT wildcharm — the deliberate "make it ours" re-anchor. Method: keep each
# brand HUE, correct only its LIGHTNESS per ground until it clears WCAG AA on the
# ground (targeting ~5.2 so raised surfaces mostly hold too); functional anchors
# (keyword/type) and the neutral comment grey stay hestia-chosen. This DECOUPLES
# the syntax layer from the terminal ANSI 16 (still wildcharm) — bat/vim-code now
# read Memphis while ls/prompt read wildcharm ANSI; accepted (bat is its own
# truecolor theme). The DANGER red #d70000 stays RESERVED for error/UI (and the
# violet accent for brand/focus) — neither is a syntax hue, so coral (constant)
# can't be misread as danger nor magenta (function) as the accent. Every syntax consumer
# (vim, bat tmTheme, Shiki/VS Code, glow) renders FROM this table. Anything not
# listed renders as roles.text (vim leaves it Normal). Full study + the ΔE/AA
# numbers: docs/theme-roadmap.md (0.9.0 decision).
syntax:
  comment:        "#8c8c8c"   # roles.dim — neutral grey, NOT brand (comments recede); AA-lightened
  string:         "#32a148"   # brand.green,   lightness-corrected for dark AA (5.24:1; brand #2b8a3e is 3.98)
  string_special: "#9e77f7"   # brand.purple,  dark-corrected (5.33:1) — escapes/regex
  constant:       "#ff4f38"   # brand.coral,   LITERAL (passes dark AA at 5.33:1) — numbers, booleans, chars
  identifier:     "#f840ac"   # brand.magenta, dark-corrected (5.24:1) — functions + members
  keyword:        "#4a8fe4"   # functional blue (no brand blue) — statements, operators, storage
  type:           "#e0a020"   # functional yellow (no brand yellow) — types, classes
  preproc:        "#0cb2c0"   # brand.teal,    LITERAL (passes dark AA at 6.75:1) — imports, macros, at-rules
  special:        "#9e77f7"   # brand.purple,  dark-corrected — delimiters, tags, specials
  diff_add:       "#32a148"   # brand green — vim Added (== string green)
  diff_change:    "#4a8fe4"   # keyword blue — vim Changed
  diff_delete:    "#ff4f38"   # brand coral — vim Removed (== constant; "delete == red")
  # error/todo are REVERSE/FILL treatments (the colour is a background or is
  # reversed), not plain foreground text — the AA-vs-surface rule above doesn't
  # apply to them; platform mappings pair error with white/accent_fg.
  error:          "#d70000"   # roles.danger — vim Error (reverse on white; bat: white on danger_dark)
  todo:           "#9e77f7"   # brand.purple (dark-corrected) — vim Todo (rendered reverse)

# vimdiff FILLS — the DiffAdd/DiffChange/DiffText/DiffDelete *backgrounds*.
# Claude/GitHub-style: a low-saturation tinted ROW that KEEPS the code's own
# syntax highlighting on top (the consumer sets guifg=NONE), NOT wildcharm's
# fg-tinting that recoloured every diff line. Distinct from syntax.diff_* above
# (those colour git-diff-language TEXT in bat/Shiki); these are the editor's
# diff-mode row fills, consumed by hestia.vim (0.8.0). Backgrounds + one fg for
# the deleted text/filler. Exempt from the AA plain-text gate (fills, like
# error/todo) — the tint is dark enough that syntax text stays legible on it.
diff:
  add_bg:     "#163a20"   # added line — muted dark green
  change_bg:  "#14303f"   # changed line — muted dark blue (Changed == blue, per syntax)
  text_bg:    "#1d4a63"   # the changed SPAN within a changed line — brighter blue
  delete_bg:  "#431624"   # deleted line / filler — muted dark maroon
  delete_fg:  "#ff4f38"   # deleted text on the maroon (brand.coral, == syntax.diff_delete)

# The LIGHT variant (roadmap M3, desktop ramp M7) — from upstream wildcharm's
# background=light branch (the roadmap doc carries the full upstream reference
# table), with hestia's deviations applied by the same rules as dark:
# AA-checked against the light surfaces, minimal steps within the xterm-256
# palette, every deviation in the roadmap decision log. Since M7 the light
# variant can drive the whole DESKTOP (bootstrap `theme_variant: light`), so
# the once-deferred desktop ramp (surface/border/…) is now defined. The AA gate
# for light checks against the #f5f5f5 desktop ground — stricter than the
# #ffffff the M3 values were tuned to, hence the 0.6.0 deviations below.
light:
  roles:
    bg:           "#f5f5f5"   # the light DESKTOP ground (M7) — a softened
                              # off-white, the mirror of dark's #000000->#1a1a1a
                              # lift; like #1a1a1a it is not an xterm colour
    code_surface: "#ffffff"   # the WEB code-block surface keeps the M3 decision:
                              # pure white, sitting RAISED on tci's warm #fefcf8
                              # page (a grey-white reads dirty there). Light-only
                              # role — dark's code surface == roles.bg
    surface:      "#e4e4e4"   # raised panels, inputs — xterm 254, wildcharm
                              # light's own Pmenu grey
    surface_alt:  "#dadada"   # hover rows, line highlight, alt rows — xterm 253
    border:       "#c6c6c6"   # separators, idle borders — xterm 251
    text:         "#1a1a1a"   # softened from upstream #000000 (17.4:1) — the
                              # mirror of dark's bg softening; == tci's light fg
    dim:          "#626262"   # tertiary text/hints — xterm 241. AA holds on bg
                              # (5.59) and surface (4.80), not surface_alt (4.36)
                              # — the exact mirror of dark dim's profile. NOTE:
                              # decoupled from syntax.comment since 0.6.0 (M3 had
                              # them equal; comment stays #6c6c6c — code sits on
                              # the ground, UI dim also sits on raised surfaces)
    muted:        "#4e4e4e"   # secondary text — xterm 239; clears every surface
    accent:       "#7c3aed"   # VIOLET, same accent both variants (0.10.0). As TEXT it
                              # clears the GROUND (5.23:1) but not raised surface (4.36) —
                              # so light link = accent on the ground only; links on raised
                              # surfaces carry an underline or use text (mirror of the dark
                              # dim guidance). No separate light link role.
    accent_dark:  "#5b21b6"   # same as dark — darker violet, sunken accent fills
    accent_fg:    "#ffffff"   # text ON the accent fill — same as dark (white-on 5.70:1)
    danger:       "#d70000"   # DANGER red, same both variants (true red, 0.10.1) — error / critical /
                              # destructive-confirm / wrong-password. On the light ground 4.75:1.
    danger_dark:  "#9b0000"   # darker danger — sunken danger fills
  # The light ANSI 16 — since 0.9.1 the SAME Memphis re-anchor as dark (the
  # chromatic slots re-hued to the brand, darkened for AA on the #f5f5f5 ground;
  # mirror of the dark ANSI note above). Re-hued: green (2/10), magenta (5/13),
  # cyan->teal (6/14), bright_red->coral (9) — all light-corrected. KEPT wildcharm
  # (upstream light) as functional anchors: blue (4/12) + yellow (3/11) — Memphis
  # has neither. color1 is the terminal RED #d70000 (0.10.1; was the accent
  # #d7005f until the accent went violet 0.10.0). Terminal consumers — cmus bars,
  # prompt dirty counts — now track this true red directly, not the accent.
  # color7 "white" mid-grey + color0 "black" pure black kept; bg is NOT color0 on light.
  ansi:
    black:          "#000000"   # [0]
    red:            "#d70000"   # [1]  terminal red (was the accent #d7005f; unified to a true red 0.10.1)
    green:          "#237133"   # [2]  brand.green, light-tuned (5.53:1)
    yellow:         "#af5f00"   # [3]  functional anchor (no brand yellow)
    blue:           "#005faf"   # [4]  functional anchor (no brand blue)
    magenta:        "#be0772"   # [5]  brand.magenta, light-tuned (5.56:1)
    cyan:           "#076d76"   # [6]  brand.teal, light-tuned (5.57:1)
    white:          "#8a8a8a"   # [7]
    bright_black:   "#808080"   # [8]
    bright_red:     "#d11800"   # [9]  brand.coral, light-tuned (5.01:1)
    bright_green:   "#277e39"   # [10] brand.green, lighter (4.66:1)
    bright_yellow:  "#d78700"   # [11] functional anchor
    bright_blue:    "#0087d7"   # [12] functional anchor
    bright_magenta: "#d40880"   # [13] brand.magenta, lighter (4.65:1)
    bright_cyan:    "#087a84"   # [14] brand.teal, lighter (4.67:1)
    bright_white:   "#ffffff"   # [15]
  # Light UI greys beyond the 16 (upstream wildcharm.vim light UI groups,
  # admitted 0.6.0) — the light counterparts of extended.ui_grey/line_grey.
  extended:
    purple:     "#5f00d7"   # light counterpart of extended.purple (added 0.8.1
                            # with the dark-purple readability pass). Mirrors
                            # light.syntax.special/string_special (== the light
                            # "purple" concept, as dark unifies extended.purple ==
                            # special == string_special); 7.81:1 on the #f5f5f5
                            # ground. Before this key, the sole consumer (yazi
                            # which-key desc) fell through vext() to the DARK
                            # #af87ff — 2.49:1 on light, a latent AA miss
    line_grey:  "#b2b2b2"   # xterm 249 — upstream light LineNr
    ui_dark:    "#5f5f5f"   # xterm 59  — upstream light StatusLine bg; also the
                            # light cursor-bar fill (vifm CurrLine / cmus sel —
                            # the inversion of dark's ui_grey #9e9e9e bar)
    heading_bg: "#e9ddff"   # violet tint (0.10.0, tracking the accent flip) —
                            # render-markdown's light heading wash (fill under accent text)
    sunken:     "#ffffff"   # light counterpart of extended.sunken — the
                            # below-ground fill flips past the ground to pure
                            # white (swaylock inside-circle, swaynag buttons)
  # LIGHT syntax — the Memphis brand hues (roles.brand) lightness-corrected DOWN
  # for AA on the #f5f5f5 desktop ground (0.9.0, the "make it ours" re-anchor;
  # mirror of dark, which corrects UP). Targeted ~5.2:1 on the ground; Comment,
  # Constant and Function land just under AA on the RAISED surface (#e4e4e4) —
  # accepted, the same posture as dark's dim-on-surface and the prior light
  # values (code sits on the ground / #ffffff web surface, where all clear AA).
  syntax:
    comment:        "#6c6c6c"   # neutral grey, NOT brand — 4.82:1 on the ground
    string:         "#247534"   # brand.green,   light-corrected (5.25:1)
    string_special: "#733af4"   # brand.purple,  light-corrected (5.29:1) — escapes/regex
    constant:       "#cc1800"   # brand.coral,   light-corrected (5.21:1) — numbers, booleans
    identifier:     "#c60777"   # brand.magenta, light-corrected (5.21:1) — functions
    keyword:        "#1c65bd"   # functional blue (no brand blue) — 5.28:1
    type:           "#855f12"   # functional yellow (no brand yellow) — 5.29:1
    preproc:        "#08717a"   # brand.teal,    light-corrected (5.27:1) — imports, at-rules
    special:        "#733af4"   # brand.purple,  light-corrected
    diff_add:       "#247534"   # brand green — vim Added (== string)
    diff_change:    "#1c65bd"   # keyword blue — vim Changed
    diff_delete:    "#cc1800"   # brand coral — vim Removed (== constant)
    # reverse/fill roles (same rule as dark — paired, never bare foregrounds)
    error:          "#d70000"   # Error (reverse on white) — kept red, not brand
    todo:           "#733af4"   # brand.purple (light-corrected) — Todo (rendered reverse)
  # vimdiff fills, light — pastel tints (dark syntax text reads on them)
  diff:
    add_bg:     "#d3efdb"   # added — light green tint
    change_bg:  "#d6e7f4"   # changed — light blue tint
    text_bg:    "#b3d4ec"   # changed span — stronger light blue
    delete_bg:  "#f6d7de"   # deleted — light red tint
    delete_fg:  "#cc1800"   # deleted text (brand.coral, == light syntax.diff_delete)
