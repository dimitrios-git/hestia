---
# Make pam_gnome_keyring the SOLE starter of the login keyring, so it unlocks at
# login with the login password (instead of a competing launcher pre-starting the
# daemon locked). docs/credential-autounlock-design.md §10.

- name: Disable the competing global gnome-keyring launchers
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    scope: global
    enabled: false
  loop:
    - gnome-keyring-daemon.service
    - gnome-keyring-daemon.socket
  become: true

- name: Ensure ~/.config/autostart exists
  ansible.builtin.file:
    path: "{{ target_home }}/.config/autostart"
    state: directory
    mode: "0755"

# A Hidden=true override in the user's autostart dir shadows the system
# /etc/xdg/autostart entry, so the daemon is NOT pre-started before PAM can hand
# it the login password.
- name: Mask the gnome-keyring XDG autostart entries
  ansible.builtin.copy:
    dest: "{{ target_home }}/.config/autostart/gnome-keyring-{{ item }}.desktop"
    content: |
      [Desktop Entry]
      Type=Application
      Hidden=true
    mode: "0644"
  loop: "{{ credentials_keyring_autostart }}"

# NOTE — NOT automated (interactive / secret-handling), do once by hand:
#  1. Recreate the login keyring so PAM keys it to the login password:
#       mv ~/.local/share/keyrings/login.keyring{,.bak}   # (+ user.keystore, default)
#     then log out/in — pam_gnome_keyring recreates it unlocked.
#  2. Store the passphrases the login hook reads:
#       secret-tool store --label='ssh: id_dimitrios' autounlock ssh keyfile id_dimitrios
#       secret-tool store --label='gpg: signing'      autounlock gpg keygrip <KEYGRIP>
# See bootstrap/README.md and docs/credential-autounlock-design.md.
