<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>html,body{margin:0;padding:0;overflow:hidden}canvas{display:block}</style>
<script type="importmap">
{ "imports": { "three": "./node_modules/three/build/three.module.js" } }
</script>
</head>
<body>
<script type="module">
// Frame-stepped bake page for every mesh flavour. The scene itself (geometry,
// motion, flash layer, loop-snapping) is mesh-scene.js — shared verbatim with
// the live preview page, so what was tuned there is what bakes here. Driven
// by an external deterministic clock: window.renderFrame(t) renders exactly
// time t.
//
// URL params: w, h, bg, line, accent, loop, flavour=plain|flash, and the
// flash knobs (count, dur, peak, spread, spreadDelay, spreadPeak, seed) —
// flash defaults are the approved tuning baked into mesh-scene.js P.
import * as THREE from 'three';
import { P, COLORS, buildScene } from './mesh-scene.js';

const q = new URLSearchParams(location.search);
const W = parseInt(q.get('w') || '3840', 10);
const H = parseInt(q.get('h') || '2160', 10);

P.variant = 'dark';   // colours come explicitly; the variant key is just a slot
COLORS.dark = {
  bg: q.get('bg') || COLORS.dark.bg,
  line: q.get('line') || COLORS.dark.line,
  accent: q.get('accent') || COLORS.dark.accent,
};
P.loopT = parseFloat(q.get('loop') || P.loopT);
if ((q.get('flavour') || 'plain') === 'plain') {
  P.flashCount = 0;   // plain = the lattice alone
} else {
  if (q.get('count')) P.flashCount = parseInt(q.get('count'), 10);
  if (q.get('dur')) P.flashDur = parseFloat(q.get('dur'));
  if (q.get('peak')) P.flashPeak = parseFloat(q.get('peak'));
  if (q.get('spread')) P.spread = q.get('spread') !== 'false';
  if (q.get('spreadDelay')) P.spreadDelay = parseFloat(q.get('spreadDelay'));
  if (q.get('spreadPeak')) P.spreadPeak = parseFloat(q.get('spreadPeak'));
  if (q.get('seed')) P.seed = parseInt(q.get('seed'), 10);
}

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(W, H);
renderer.setPixelRatio(1);
document.body.appendChild(renderer.domElement);

const scene = buildScene(renderer, W, H);
scene.rebuild();   // pick up the URL-driven P/COLORS

window.renderFrame = (t) => { scene.renderFrame(t); return true; };
window.meshReady = true;
</script>
</body>
</html>
