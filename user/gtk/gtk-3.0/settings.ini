# GTK 3 settings — dark base for the unified theme. Firefox (a GTK3 app) reads this for
# its file chooser / native widgets, so it's the most visible GTK surface. The accent
# recolour lives next to this in gtk.css. See docs/theming.md (GTK / Adwaita).
[Settings]
gtk-theme-name=Adwaita-dark
gtk-application-prefer-dark-theme=1
gtk-icon-theme-name=Adwaita
