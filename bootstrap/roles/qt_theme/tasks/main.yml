---
# Install the hestia Qt/KDE colour scheme (the wildcharm palette as a KDE colour scheme).
# No root, no Kvantum: KDE-Frameworks apps read colours from ~/.config/kdeglobals
# (KColorScheme) and discover the named scheme in ~/.local/share/color-schemes
# (KColorSchemeManager — e.g. Kdenlive's theme selector). One template renders to both
# locations, so the palette stays the single source. Idempotent by nature — the template
# module only rewrites on a content change. See docs/theming.md (Qt/KDE track).
#
# hestia OWNS kdeglobals for theming (like the other deployed configs): a re-run resets it
# to the rendered scheme, so a colour changed inside a KDE app's settings won't persist —
# change the palette here instead. Non-colour global KDE keys are not managed.

- name: Ensure the KDE colour-scheme + config dirs exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ target_home }}/.config"
    - "{{ target_home }}/.local/share/color-schemes"

# BOTH variants' schemes are always installed (selectable in-app, e.g. Kdenlive's
# theme menu); kdeglobals — what KDE apps actually read — renders from the ACTIVE
# `theme_variant` (M7).
- name: Render the hestia colour schemes (both variants' selectable .colors)
  ansible.builtin.template:
    src: kdeglobals.j2
    dest: "{{ target_home }}/.local/share/color-schemes/{{ qt_theme_schemes[item].name }}.colors"
    mode: "0644"
  loop: [dark, light]
  vars:
    qt_scheme: "{{ qt_theme_schemes[item] }}"

- name: Render kdeglobals from the active theme_variant
  ansible.builtin.template:
    src: kdeglobals.j2
    dest: "{{ target_home }}/.config/kdeglobals"
    mode: "0644"
  vars:
    qt_scheme: "{{ qt_theme_schemes[theme_variant] }}"

# Some KDE apps do NOT follow the system kdeglobals scheme on their own — they keep a
# per-app choice in <app>rc [UiSettings] ColorSchemePath (KColorSchemeManager), so on a
# fresh machine they'd come up on bundled Breeze until selected by hand. This is the
# per-app "selection" step (the Qt analogue of gtk_theme's gsettings gtk-theme=hestia-dark,
# which sway sets at login): point each installed app at the scheme so a from-zero
# bootstrap is themed with no manual pick. kwriteconfig6 is KDE's own KConfig writer (from
# libkf6config-bin, which any KF6 app pulls in) — format-correct, idempotent, and no new
# collection dependency. Kdenlive proved the mechanism; the file-manager evaluation adds
# krusader + dolphin on their toggle — the rc list assembles from whichever are enabled.
- name: Default KDE apps to the hestia colour scheme
  vars:
    _qt_scheme_rcs: >-
      {{ (['kdenliverc'] if enable_kdenlive | default(false) | bool else [])
       + (['krusaderrc', 'dolphinrc'] if enable_file_managers | default(false) | bool else []) }}
  when: _qt_scheme_rcs | length > 0
  block:
    - name: Find the KF6 config tools (kwriteconfig6 / kreadconfig6)
      ansible.builtin.command: which kwriteconfig6 kreadconfig6
      register: _qt_kwc
      changed_when: false
      failed_when: false

    - name: Point each app's UiSettings at the hestia scheme (only if the KF6 tools exist)
      when: _qt_kwc.rc == 0
      block:
        - name: Read each app's current ColorSchemePath
          ansible.builtin.command:
            argv:
              - kreadconfig6
              - --file
              - "{{ target_home }}/.config/{{ item }}"
              - --group
              - UiSettings
              - --key
              - ColorSchemePath
          loop: "{{ _qt_scheme_rcs }}"
          register: _qt_cur_scheme
          changed_when: false
          failed_when: false

        - name: Set ColorSchemePath={{ qt_theme_schemes[theme_variant].name }}.colors
          ansible.builtin.command:
            argv:
              - kwriteconfig6
              - --file
              - "{{ target_home }}/.config/{{ item.item }}"
              - --group
              - UiSettings
              - --key
              - ColorSchemePath
              - "{{ qt_theme_schemes[theme_variant].name }}.colors"
          loop: "{{ _qt_cur_scheme.results }}"
          loop_control:
            label: "{{ item.item }}"
          when: (item.stdout | default('') | trim) != (qt_theme_schemes[theme_variant].name ~ '.colors')
          changed_when: true
