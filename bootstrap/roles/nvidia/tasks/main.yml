---
# Install the NVIDIA proprietary driver (Debian non-free). OPT-IN: gated by
# `enable_nvidia` (default false) in site.yml — it's host-specific, pulls in non-free,
# builds a kernel module (DKMS), and needs a REBOOT. setup.sh detects a card (lspci /
# sysfs vendor 0x10de) and asks, default = detected.
#
# Idempotent: re-running with the driver already present and the repo already enabled
# is changed=0. NOTE: the actual driver install + kernel module can't be auto-verified
# here (needs root + a reboot) — review/test on a real NVIDIA host.

- name: Detect the Debian release codename
  ansible.builtin.shell: . /etc/os-release && printf '%s' "$VERSION_CODENAME"
  register: _deb_codename
  changed_when: false

- name: Enable contrib + non-free + non-free-firmware for the driver
  # When nvidia_backports is on, the same .sources file also enables <codename>-backports
  # so a >= 555 driver (explicit sync — see defaults/main.yml) is installable from there.
  ansible.builtin.deb822_repository:
    name: hestia-nvidia
    types: [deb]
    uris: "{{ nvidia_mirror_uri }}"
    suites: "{{ [_deb_codename.stdout] + ([_deb_codename.stdout ~ '-backports'] if nvidia_backports | bool else []) }}"
    components: "{{ nvidia_components }}"
    signed_by: /usr/share/keyrings/debian-archive-keyring.gpg
    state: present
  become: true

- name: Fetch the backports index before pinning to it
  # Chicken-and-egg: the apt module sets APT::Default-Release for the WHOLE call, and apt
  # validates that value against the release lists it has ALREADY downloaded. Setting
  # default_release=<codename>-backports on the same call that first adds backports fails
  # with "release is not available in the sources" (the backports index isn't fetched yet).
  # So refresh the cache here FIRST, with no default_release — that pulls the backports
  # index in — and only then can the install below pin to it. (Only needed when the flip
  # is on; the base-suite path indexes fine via the install task's own update_cache.)
  ansible.builtin.apt:
    update_cache: true
  become: true
  when: nvidia_backports | bool

- name: Install the NVIDIA driver + kernel headers
  # default_release pins the driver (and the deps it needs pulled) to backports when
  # enabled — backports has priority 100, so without this apt would keep the base suite.
  # Matches the backports Release Codename (n=<codename>-backports), not its Suite
  # (a=stable-backports). Omitted when the flip is off → normal base-suite install.
  ansible.builtin.apt:
    name: "{{ nvidia_packages }}"
    state: present
    update_cache: true
    default_release: "{{ (_deb_codename.stdout ~ '-backports') if nvidia_backports | bool else omit }}"
  become: true
  register: _nvidia_apt

- name: A reboot is required before the driver loads
  ansible.builtin.debug:
    msg: >-
      NVIDIA driver installed/updated — REBOOT before it loads (the nouveau blacklist
      and the DKMS kernel module take effect on the next boot).
  when: _nvidia_apt is changed
