---
# Download + install the prebuilt Yaru-hestia icon theme (no root, no build deps —
# the render happened once, off-machine; see README.md). Idempotent via a
# per-release marker. Uses target_home (not ansible_env) because the play runs
# gather_facts: false.

- name: Check the Yaru-icons marker
  ansible.builtin.stat:
    path: "{{ yaru_icons_marker }}"
  register: yaru_icons_marker_stat

- name: Install the Yaru-hestia icon theme
  when: not yaru_icons_marker_stat.stat.exists
  block:
    - name: Ensure the icons, cache and state dirs exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ yaru_icons_dir }}"
        - "{{ yaru_icons_dl | dirname }}"
        - "{{ yaru_icons_marker | dirname }}"

    - name: Download the theme tarball (sha256-verified)
      ansible.builtin.get_url:
        url: "{{ yaru_icons_url }}"
        dest: "{{ yaru_icons_dl }}"
        checksum: "sha256:{{ yaru_icons_sha256 }}"
        mode: "0644"

    # NO `creates:` guard. It would key on Yaru-hestia/index.theme, which PERSISTS
    # across releases — so on a version bump (e.g. v2 red -> v3 violet) unarchive
    # would SKIP and the new icons never land, even though the marker gate let the
    # block in. Idempotency is the per-release marker (this whole block is gated on
    # it); within the block we always extract so an upgrade actually overwrites.
    - name: Extract the theme into ~/.local/share/icons
      ansible.builtin.unarchive:
        src: "{{ yaru_icons_dl }}"
        remote_src: true
        dest: "{{ yaru_icons_dir }}"

    # Best-effort: the theme works without a cache (GTK reads index.theme), but the
    # cache speeds lookups. Skip cleanly if gtk-update-icon-cache isn't installed.
    - name: Refresh the icon caches
      ansible.builtin.command:
        cmd: "gtk-update-icon-cache -qtf {{ yaru_icons_dir }}/{{ item }}"
      loop: "{{ yaru_icons_bundled }}"
      changed_when: true
      failed_when: false

    - name: Mark the theme installed
      ansible.builtin.file:
        path: "{{ yaru_icons_marker }}"
        state: touch
        mode: "0644"
