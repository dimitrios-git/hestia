---
# Deploy user configs from the manifest: symlink the plain ones, render the
# path-generalised `templated_configs` (.j2 → no hardcoded /home/<user>).
# Idempotent: re-running is a no-op when links/renders are already correct. Runs as
# the invoking user (no become) — these live in $HOME. Replaces the manual `ln -s`.

# ~/.gnupg must be 0700 or gpg refuses to use it. Set explicitly (and only here —
# the generic parent-dir task below does NOT manage mode, so it never downgrades
# sensitive dirs like ~/.gnupg or the 0750 home).
- name: Ensure ~/.gnupg exists with gpg-safe perms
  ansible.builtin.file:
    path: "{{ target_home }}/.gnupg"
    state: directory
    mode: "0700"

# Create any missing parent dirs WITHOUT touching mode of existing ones. Omitting
# `mode` is deliberate: existing dirs keep their perms (so the 0750 home and any
# 0700 dirs are preserved); new dirs are created at the user's umask. Deduped so
# shared parents (e.g. $HOME, ~/.config/waybar) aren't revisited.
- name: Ensure parent directories of dotfiles exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
  loop: "{{ (dotfile_links + templated_configs) | map(attribute='dest') | map('dirname') | unique | list }}"
  loop_control:
    label: "{{ item }}"

# Safety net: the symlink/template tasks below force-replace whatever sits at each
# dest. First move any pre-existing REAL file (a user's own dotfile — not a symlink)
# aside to <dest>.bak, so a first run on a populated $HOME is non-destructive.
# `creates:` keeps it idempotent and never clobbers an earlier backup; on re-runs
# the dests are our own symlinks (not regular files), so nothing is touched.
# (templated_configs get the template module's own `backup:` below.)
- name: Stat dotfile destinations (to find real files to back up)
  ansible.builtin.stat:
    path: "{{ item.dest }}"
  loop: "{{ dotfile_links }}"
  loop_control:
    label: "{{ item.dest }}"
  register: _dotfile_dests

- name: Back up any pre-existing real dotfile before replacing it
  ansible.builtin.command:
    cmd: "mv -- {{ item.item.dest | quote }} {{ (item.item.dest ~ '.bak') | quote }}"
    creates: "{{ item.item.dest }}.bak"
  loop: "{{ _dotfile_dests.results }}"
  loop_control:
    label: "{{ item.item.dest }} -> {{ item.item.dest }}.bak"
  when: item.stat.exists and item.stat.isreg and not item.stat.islnk

- name: Symlink dotfiles from the repo
  ansible.builtin.file:
    src: "{{ repo_root }}/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true            # replace a pre-existing plain file/wrong link
  loop: "{{ dotfile_links }}"
  loop_control:
    label: "{{ item.src }} -> {{ item.dest }}"

# Path-generalised configs (docs/repo-structure-design.md §5): rendered from a .j2
# so no /home/<user> literal is baked in. `force: true` replaces a pre-existing
# symlink (e.g. an older deploy that symlinked glow.yml) with the rendered file.
- name: Render templated configs from the manifest
  ansible.builtin.template:
    src: "{{ repo_root }}/{{ item.src }}"
    dest: "{{ item.dest }}"
    force: true
    backup: true                                 # back up a pre-existing file on change
    mode: "{{ item.mode | default('0644') }}"   # scripts that get executed need 0755
  loop: "{{ templated_configs }}"
  loop_control:
    label: "{{ item.src }} -> {{ item.dest }}"
