# Portal backend routing for the Sway session (matched via XDG_CURRENT_DESKTOP=sway).
# ScreenCast/Screenshot must go to the wlroots backend (xdg-desktop-portal-wlr)
# so screen sharing works; everything else (file picker, settings) -> gtk.
# If xdg-desktop-portal-gtk is NOT installed, change default to wlr, but note
# wlr only implements ScreenCast/Screenshot (file picker would be unavailable).
[preferred]
default=gtk
org.freedesktop.impl.portal.ScreenCast=wlr
org.freedesktop.impl.portal.Screenshot=wlr
# Settings (org.freedesktop.appearance color-scheme) MUST be pinned to gtk. Once the
# Qt-theming track pulled in xdg-desktop-portal-kde (via plasma-integration, for the
# dolphin/krusader file managers), TWO backends declare the Settings impl and
# `default=gtk` alone doesn't stop the kde backend from answering the color-scheme
# query — it reported "no preference", so libadwaita / GTK4 apps that read the portal
# (file-roller's Compress dialog, nautilus) fell back to LIGHT while GTK3 apps stayed
# dark via GTK_THEME. Pinning Settings→gtk makes the gtk backend answer from gsettings
# `color-scheme` (prefer-dark set at login by the sway theme fragment).
org.freedesktop.impl.portal.Settings=gtk
