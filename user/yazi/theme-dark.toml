# File-type rules — from render.py's shared filetype_colors() table (the same
# one vifm's colorscheme and ~/.dircolors render from, so all three agree).
[filetype]
rules = [
    { fg = "#ff87ff" , mime = "image/*" },
    { fg = "#d787d7" , mime = "video/*" },
    { fg = "#00d7d7" , mime = "audio/*" },
    { fg = "#ff5f87" , mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}" },
    { fg = "#ffaf00" , mime = "application/{pdf,doc,rtf}" },
    { fg = "#ff5f87", crossed = true , url = "*", is = "orphan" },
    { fg = "#00d75f" , url = "*", is = "exec" },
    { fg = "#ffffff", bg = "#9b0040" , url = "*", is = "dummy" },
    { fg = "#ffffff", bg = "#9b0040" , url = "*/", is = "dummy" },
    { fg = "#00afff", bold = true , url = "*/" },
]
