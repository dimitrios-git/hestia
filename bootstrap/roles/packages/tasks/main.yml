---
# Install apt packages from the manifest. Needs become (root). The apt_packages
# dict is flattened to a single install call so apt resolves them together —
# minus any feature-gated group whose toggle is off (package_group_features),
# so a disabled feature doesn't drag in its packages.

- name: Install apt packages (feature-gated groups skipped when their toggle is off)
  ansible.builtin.apt:
    name: "{{ apt_packages | dict2items
              | rejectattr('key', 'in', disabled_pkg_groups)
              | map(attribute='value') | flatten }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  vars:
    # groups whose mapped toggle resolved to false
    disabled_pkg_groups: "{{ package_group_features | dict2items
                             | rejectattr('value') | map(attribute='key') | list }}"

# iperf3 ships a systemd service that runs `iperf3 --server` — an open bandwidth-
# test daemon listening on tcp/5201. We install iperf3 only as a client-side
# diagnostic (it's how we chase samba/network throughput), so the server must NOT
# come up by default. Keep the unit disabled + stopped; run an ad-hoc server with
# `iperf3 -s` by hand (or `systemctl start iperf3`) only for the duration of a test.
- name: Ensure the iperf3 server daemon is not enabled by default
  ansible.builtin.systemd:
    name: iperf3.service
    enabled: false
    state: stopped
  become: true
  when: "'iperf3' in apt_packages.misc"

# Debian points the `editor` alternative (used by sensible-editor, `crontab -e`,
# `sudoedit`, etc.) at nano. We install full vim — make it the system default. (git
# already uses core.editor=vim; .bashrc also exports EDITOR/VISUAL=vim for the shell.)
- name: Query the current editor alternative
  ansible.builtin.command: update-alternatives --query editor
  register: _editor_alt
  changed_when: false

- name: Set vim as the system default editor (Debian defaults to nano)
  ansible.builtin.command: update-alternatives --set editor /usr/bin/vim.basic
  become: true
  changed_when: true
  when:
    - "'/usr/bin/vim.basic' in _editor_alt.stdout"          # vim is installed (alternative registered)
    - not (_editor_alt.stdout is search('Value: /usr/bin/vim'))  # not already a vim*
