---
# Razer peripherals (enable_razer, hardware-detected by setup.sh like NVIDIA):
# OpenRazer (the userspace daemon + DKMS kernel driver) and Polychromatic (the
# RGB/config GUI). Root (become). TWO third-party repos, each for a reason:
#
# - openrazer comes from the OBS hardware:razer repo, NOT Debian apt: Debian's
#   3.10.2 predates the kernel's hid_report_raw_event() 6-arg change, which
#   Debian BACKPORTED into its stable 6.12.94 kernel — the DKMS build fails
#   with "too few arguments" (caught live; built fine on 6.12.90). Upstream
#   fixed it with a version guard that explicitly covers the 6.12.93+ stable
#   backport, first shipped in 3.12.x; OBS builds current releases for
#   Debian_13. When Debian's own openrazer catches up, this repo can go.
# - polychromatic is NOT in Debian at all (and not in the OBS razer repo —
#   checked); its vendor runs debian.polychromatic.app, which replaced their
#   SHA-1-signed Launchpad PPA that trixie's apt rejects since 2026-02.
#
# The DKMS driver builds against the running kernel's headers; dkms is pulled
# by the driver package and this machine's headers ride the nvidia role, but a
# Razer-only spin needs them too — hence linux-headers-amd64 here (the razer
# hardware the driver supports is x86-desktop gear; the role skips other
# arches wholesale). Manual afterwards (printed at the end): re-login for the
# plugdev group, and a REBOOT (or device replug) for the module to bind.

- name: Detect CPU architecture
  ansible.builtin.command: uname -m
  register: _rz_arch
  changed_when: false

- name: "razer: no amd64 -> skip (headers metapackage + Razer gear are x86)"
  ansible.builtin.debug:
    msg: "Skipping the razer role on {{ _rz_arch.stdout }}."
  when: _rz_arch.stdout != 'x86_64'

- name: Install OpenRazer + Polychromatic
  when: _rz_arch.stdout == 'x86_64'
  block:
    - name: Detect the Debian codename + major version (the repos are per-release)
      ansible.builtin.shell: . /etc/os-release && printf '%s' "$VERSION_CODENAME"
      register: _rz_codename
      changed_when: false

    - name: Detect the Debian major version (the OBS repo path uses Debian_<N>)
      ansible.builtin.shell: . /etc/os-release && printf '%s' "$VERSION_ID"
      register: _rz_debver
      changed_when: false

    - name: Install the OBS hardware:razer apt signing key (armored)
      ansible.builtin.get_url:
        url: "https://download.opensuse.org/repositories/hardware:/razer/Debian_{{ _rz_debver.stdout }}/Release.key"
        dest: /usr/share/keyrings/obs-hardware-razer-keyring.asc
        owner: root
        group: root
        mode: "0644"
      become: true

    - name: Add the OBS hardware:razer apt repository (openrazer 3.12.x for Debian stable)
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/hardware-razer.list
        content: "deb [signed-by=/usr/share/keyrings/obs-hardware-razer-keyring.asc] https://download.opensuse.org/repositories/hardware:/razer/Debian_{{ _rz_debver.stdout }}/ /\n"
        owner: root
        group: root
        mode: "0644"
      become: true

    - name: Install the Polychromatic apt signing key (armored)
      ansible.builtin.get_url:
        url: https://debian.polychromatic.app/key.asc
        dest: /usr/share/keyrings/polychromatic-archive-keyring.asc
        owner: root
        group: root
        mode: "0644"
      become: true

    - name: Add the Polychromatic apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/polychromatic.list
        content: "deb [signed-by=/usr/share/keyrings/polychromatic-archive-keyring.asc] https://debian.polychromatic.app {{ _rz_codename.stdout }} main\n"
        owner: root
        group: root
        mode: "0644"
      become: true

    - name: Install openrazer (Debian apt) + polychromatic (vendor repo) + headers for DKMS
      ansible.builtin.apt:
        name:
          - openrazer-meta
          - linux-headers-amd64
          - polychromatic
        state: present
        update_cache: true
      become: true

    - name: Ensure the user is in plugdev (openrazer's device-access group)
      ansible.builtin.user:
        name: "{{ lookup('env', 'USER') }}"
        groups: plugdev
        append: true
      become: true

    # openrazer-daemon (vendor unit, enabled by preset) starts at session login, and
    # sometimes loses the boot race with the razer module binding the device / the
    # session DBus coming up — it then exits non-zero and stays down ("Failed to start
    # openrazer-daemon.service" at boot; a manual start afterwards works). A user drop-in
    # with Restart=on-failure lets systemd retry once the device/bus is ready. Deployed
    # to the user's ~/.config (NOT the vendor unit at /usr/lib, which apt would clobber);
    # StartLimitIntervalSec=0 disables the retry rate-limit so a slow enumeration can't
    # exhaust the burst budget before the device appears. Written as the user (no become).
    - name: Ensure the openrazer-daemon user drop-in dir exists
      ansible.builtin.file:
        path: "{{ target_home }}/.config/systemd/user/openrazer-daemon.service.d"
        state: directory
        mode: "0755"

    - name: Install the Restart=on-failure drop-in (survive the boot race)
      ansible.builtin.copy:
        dest: "{{ target_home }}/.config/systemd/user/openrazer-daemon.service.d/override.conf"
        mode: "0644"
        content: |
          # Managed by hestia (bootstrap/roles/razer). openrazer-daemon can lose the
          # boot race with the razer module/udev/session-DBus and exit non-zero; retry
          # until the device/bus is ready instead of staying dead for the session.
          [Unit]
          StartLimitIntervalSec=0

          [Service]
          Restart=on-failure
          RestartSec=2
      register: _rz_override

    - name: Reload the user systemd manager so the drop-in applies
      # Tolerant: during a headless/SSH run the user bus may be absent — the file is on
      # disk regardless and takes effect at the next login / daemon-reload.
      ansible.builtin.command: systemctl --user daemon-reload
      changed_when: false
      failed_when: false
      when: _rz_override is changed

    - name: The manual tail (printed, not automated)
      ansible.builtin.debug:
        msg: >-
          OpenRazer + Polychromatic installed. Manual: RE-LOGIN if plugdev was
          just added, and REBOOT (or unplug/replug the device) so the DKMS
          module binds — then run `polychromatic-controller`. The daemon now
          carries a Restart=on-failure drop-in, so it recovers from the login
          race on its own (applies next login / after a `systemctl --user
          daemon-reload`).
